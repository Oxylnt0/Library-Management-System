<header class="h-20 bg-[#3E2723] backdrop-blur-md text-[#D4AF37] flex items-center justify-between px-6 shadow-sm border-b border-[#2D1B18] shrink-0 relative z-20 overflow-hidden">

    <!-- Enchantment Particles -->
    <div id="particles-container" class="absolute inset-0 pointer-events-none"></div>

    <!-- LEFT: Nav Links -->
    <div class="flex items-center gap-8 relative z-10 hidden md:flex">
        <button onclick="openTopbarModal('about')" class="font-cinzel font-bold text-sm hover:text-white transition-colors">About</button>
        <button onclick="openTopbarModal('contact')" class="font-cinzel font-bold text-sm hover:text-white transition-colors">Contact</button>
        <button onclick="openTopbarModal('faq')" class="font-cinzel font-bold text-sm hover:text-white transition-colors">FAQ</button>
    </div>

    <div class="flex items-center space-x-6 relative z-10">
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p id="topbar-user-name" class="text-sm font-bold text-[#D4AF37] font-cinzel">Loading...</p>
                <p id="topbar-user-id" class="text-xs text-[#A1887F]">User ID: ...</p>
            </div>
            <a href="user_account.html" id="topbar-user-initials"
                class="h-10 w-10 rounded-full bg-gradient-to-br from-[#5D4037] to-[#3E2723] text-[#D4AF37] flex items-center justify-center font-bold hover:scale-105 transition-transform border-2 border-[#D4AF37] shadow-md">
                --
            </a>
        </div>
    </div>

    <style>
        @keyframes float-enchant {
            0% { transform: translateY(20px) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-30px) scale(1.2) rotate(10deg); opacity: 0; }
        }
        .enchant-particle {
            position: absolute;
            color: rgba(212, 175, 55, 0.2);
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 2px rgba(212, 175, 55, 0.2);
            animation: float-enchant 4s linear infinite;
        }
        /* Scrollbar for modal */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #b59226; }
    </style>
</header>

<!-- TOPBAR MODAL -->
<div id="topbar-modal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 font-sans">
    <div class="bg-[#fffaf0] w-full max-w-5xl max-h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-[#D4AF37] transform scale-95 transition-transform duration-300" id="topbar-modal-panel">
        <!-- Modal Header -->
        <div class="p-5 border-b border-[#D4AF37]/30 flex justify-between items-center bg-gradient-to-r from-[#3E2723] to-[#5D4037] text-white">
            <h3 id="topbar-modal-title" class="text-2xl font-bold font-cinzel text-[#D4AF37]">Title</h3>
            <button onclick="closeTopbarModal()" class="text-white/70 hover:text-[#D4AF37] transition-colors text-3xl leading-none">&times;</button>
        </div>
        <!-- Modal Body -->
        <div id="topbar-modal-body" class="p-8 overflow-y-auto custom-scrollbar text-slate-800">
            <!-- Dynamic Content -->
        </div>
    </div>
</div>
