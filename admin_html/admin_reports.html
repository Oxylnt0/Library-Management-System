<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Reports</title>
    
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' https: http:; script-src 'self' 'unsafe-inline' https://esm.run https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:3000 https://cdnjs.cloudflare.com https://unpkg.com;">

    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../assets/background.png');"></div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-72 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">

            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                <div class="flex-1 flex flex-col overflow-hidden p-6">

                    <!-- Header & Controls -->
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 shrink-0">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800 font-cinzel">Reports Center</h2>
                            <p class="text-sm text-slate-500">Generate and export system reports</p>
                        </div>

                        <div class="flex flex-wrap gap-3 items-center">
                            <div class="flex items-center bg-white border border-slate-300 rounded-full px-4 py-2 shadow-sm gap-2">
                                <span class="text-xs font-bold text-slate-500 uppercase">Date Range:</span>
                                <input type="date" id="date-start" class="text-sm text-slate-700 outline-none bg-transparent">
                                <span class="text-slate-400">-</span>
                                <input type="date" id="date-end" class="text-sm text-slate-700 outline-none bg-transparent">
                            </div>
                            
                            <button onclick="exportData('pdf')" class="bg-[#183B5B] hover:bg-[#2E5F87] text-[#D6A84A] px-4 py-2 rounded-full font-bold text-sm shadow-md transition-colors flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> PDF
                            </button>
                            <button onclick="exportData('csv')" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-4 py-2 rounded-full font-bold text-sm shadow-sm transition-colors flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Excel/CSV
                            </button>
                        </div>
                    </div>

                    <!-- Tabs -->
                    <div class="flex border-b border-slate-200 mb-4 overflow-x-auto">
                        <button onclick="switchTab('circulation')" id="tab-circulation" class="px-6 py-3 text-sm font-bold text-[#183B5B] border-b-2 border-[#183B5B] transition-colors whitespace-nowrap">Circulation & Usage</button>
                        <button onclick="switchTab('inventory')" id="tab-inventory" class="px-6 py-3 text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700 transition-colors whitespace-nowrap">Collection & Inventory</button>
                        <button onclick="switchTab('financials')" id="tab-financials" class="px-6 py-3 text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700 transition-colors whitespace-nowrap">Financials</button>
                        <button onclick="switchTab('users')" id="tab-users" class="px-6 py-3 text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700 transition-colors whitespace-nowrap">Users & Disciplinary</button>
                        <button onclick="switchTab('audits')" id="tab-audits" class="px-6 py-3 text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700 transition-colors whitespace-nowrap">System Audits</button>
                    </div>

                    <!-- Summary Cards (Dynamic) -->
                    <div id="summary-cards" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-6">
                        <!-- Cards injected by JS -->
                    </div>

                    <!-- Sub-Report Selector (Chips) -->
                    <div class="flex flex-wrap gap-2 mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200" id="report-selector">
                        <!-- Injected by JS -->
                    </div>

                    <!-- Data Table -->
                    <div class="flex-1 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
                        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                            <h3 class="font-bold text-slate-700" id="table-title">Select a report to view data</h3>
                            <span class="text-xs text-slate-500" id="record-count"></span>
                        </div>
                        
                        <div class="flex-1 overflow-auto">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 sticky top-0 z-10 text-xs font-bold text-slate-500 uppercase">
                                    <tr id="table-header">
                                        <!-- Injected by JS -->
                                    </tr>
                                </thead>
                                <tbody id="table-body" class="divide-y divide-slate-100 text-sm text-slate-600">
                                    <!-- Injected by JS -->
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="p-3 border-t border-slate-200 bg-slate-50 text-xs text-slate-400 text-center">
                            End of Report
                        </div>
                    </div>
                </div>

                </main>

                <!-- PDF Generation Libraries (Must be inside wrapper for dynamic loading) -->
                <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
                <script src="https://unpkg.com/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>
                
                <script src="../admin_js/admin_reports.js"></script>
                <script>
                    if (typeof window.initReports === 'function') window.initReports();
                </script>
            </div>
        </div>
    </div>

    <script src="../admin_js/dashboard_loader.js"></script>
</body>

</html>
