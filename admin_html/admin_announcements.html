<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Announcements</title>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' https: http:; script-src 'self' 'unsafe-inline' https://esm.run https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:3000 https://cdnjs.cloudflare.com;">

    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat"
        style="background-image: url('../assets/background.png');"></div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-72 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">

            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                    <div class="flex-1 flex flex-col overflow-hidden p-6">

                        <!-- Header -->
                        <div class="flex justify-between items-center mb-6 shrink-0">
                            <div>
                                <h2 class="text-2xl font-bold text-slate-800 font-cinzel">Announcements</h2>
                                <p class="text-sm text-slate-500">Manage library news and alerts</p>
                            </div>
                            <button onclick="openAnnouncementModal()"
                                class="bg-[#183B5B] hover:bg-[#2E5F87] text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md transition-colors flex items-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 4v16m8-8H4"></path>
                                </svg>
                                New Announcement
                            </button>
                        </div>

                        <!-- Grid -->
                        <div
                            class="flex-1 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
                            <div class="overflow-y-auto flex-1">
                                <table class="w-full text-left border-collapse">
                                    <thead
                                        class="bg-slate-50 sticky top-0 z-10 text-xs font-bold text-slate-500 uppercase">
                                        <tr>
                                            <th class="p-4 border-b">Title</th>
                                            <th class="p-4 border-b">Priority</th>
                                            <th class="p-4 border-b">Status</th>
                                            <th class="p-4 border-b">Valid Until</th>
                                            <th class="p-4 border-b">Author</th>
                                            <th class="p-4 border-b text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="announcement-table-body"
                                        class="divide-y divide-slate-100 text-sm text-slate-600">
                                        <!-- Rows injected by JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </main>

                <!-- Create/Edit Modal -->
                <div id="announcement-modal"
                    class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm transition-opacity duration-300">
                    <div
                        class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 relative transform transition-all scale-100">
                        <button onclick="closeAnnouncementModal()"
                            class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>

                        <h3 class="text-xl font-bold text-[#183B5B] mb-4 font-cinzel" id="modal-title">New Announcement
                        </h3>

                        <form id="announcement-form" class="space-y-4">
                            <input type="hidden" id="ann-id">

                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1">Title</label>
                                <input type="text" id="ann-title" required
                                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B] font-bold text-slate-800"
                                    placeholder="e.g. Holiday Closure">
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1">Message Content</label>
                                <textarea id="ann-content" required rows="4"
                                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B] text-sm"
                                    placeholder="Enter your announcement details here..."></textarea>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-1">Priority</label>
                                    <select id="ann-priority"
                                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B] text-sm">
                                        <option value="Normal">Normal</option>
                                        <option value="High">High</option>
                                        <option value="Urgent">Urgent</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-1">Status</label>
                                    <select id="ann-status"
                                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B] text-sm">
                                        <option value="Published">Published</option>
                                        <option value="Draft">Draft</option>
                                        <option value="Archived">Archived</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1">Expiration Date <span
                                        class="text-xs font-normal text-slate-400">(Optional)</span></label>
                                <input type="datetime-local" id="ann-valid-until"
                                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B] text-sm text-slate-600">
                                <p class="text-xs text-slate-400 mt-1">Leave blank if this announcement never expires.
                                </p>
                            </div>

                            <div class="pt-4 flex justify-end gap-3">
                                <button type="button" onclick="closeAnnouncementModal()"
                                    class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-bold text-sm transition-colors">Cancel</button>
                                <button type="submit"
                                    class="px-6 py-2 bg-[#183B5B] text-white rounded-lg hover:bg-[#2E5F87] font-bold text-sm transition-colors shadow-md">Save
                                    Announcement</button>
                            </div>
                        </form>
                    </div>
                </div>

                <script src="../admin_js/admin_announcements.js"></script>
            </div>
        </div>
    </div>

    <script src="../admin_js/dashboard_loader.js"></script>
</body>

</html>
