<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - System Settings</title>

    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../Assets/background.png');"></div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-72 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">

            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                <div class="flex-1 flex flex-col overflow-hidden p-6">

                    <div class="flex justify-between items-center mb-6 shrink-0">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">System Configuration</h2>
                            <p class="text-sm text-slate-500">Manage library policies and general preferences</p>
                        </div>
                        <button id="btn-save-settings"
                            class="bg-[#183B5B] hover:bg-[#2E5F87] text-[#D6A84A] px-6 py-2 rounded-full font-bold shadow-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            Save Changes
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto space-y-6 pr-2">

                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div class="flex items-center mb-4 border-b border-slate-100 pb-2">
                                <span class="bg-blue-100 text-blue-600 p-2 rounded-lg mr-3"></span>
                                <h3 class="font-bold text-slate-800">Lending Policies</h3>
                            </div>
                            <div class="grid grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Standard Loan
                                        Period (Days)</label>
                                    <input type="number" value="7"
                                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Max Books per
                                        Student</label>
                                    <input type="number" value="3"
                                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                                </div>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div class="flex items-center mb-4 border-b border-slate-100 pb-2">
                                <span class="bg-amber-100 text-amber-600 p-2 rounded-lg mr-3"></span>
                                <h3 class="font-bold text-slate-800">Fines & Fees</h3>
                            </div>
                            <div class="grid grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Overdue (Daily)</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-2 text-slate-400">₱</span>
                                        <input type="number" value="5.00"
                                            class="w-full pl-8 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-amber-500">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Moderate Damage</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-2 text-slate-400">₱</span>
                                        <input type="number" value="150.00"
                                            class="w-full pl-8 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-amber-500">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Severe Damage</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-2 text-slate-400">₱</span>
                                        <input type="number" value="500.00"
                                            class="w-full pl-8 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-amber-500">
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                </main>

                <script>
                    function applySettingsRestrictions() {
                        const adminRole = localStorage.getItem('adminRole');
                        if (adminRole && adminRole.trim() !== 'Administrator') {
                            const saveBtn = document.getElementById('btn-save-settings');
                            const inputs = document.querySelectorAll('input[type="number"]');
                            const elementsToDisable = [saveBtn, ...inputs];

                            elementsToDisable.forEach(el => {
                                if (!el) return;
                                el.disabled = true;
                                el.setAttribute('disabled', 'true');
                                if (el.tagName === 'INPUT') {
                                    el.readOnly = true;
                                    el.setAttribute('readonly', 'true');
                                }
                                el.title = "For Administrator only";
                                el.classList.add('cursor-not-allowed', 'opacity-50');
                            });
                        }
                    }
                    
                    // Use a polling mechanism to ensure elements are in the DOM before applying restrictions.
                    // This is more robust for Single Page Application (SPA) navigation.
                    function pollForElements() {
                        const saveBtn = document.getElementById('btn-save-settings');
                        if (saveBtn) {
                            applySettingsRestrictions();
                        } else {
                            setTimeout(pollForElements, 50); // Check again in 50ms
                        }
                    }
                    pollForElements();
                </script>
            </div>
        </div>
    </div>

    <script src="../admin_js/dashboard_loader.js"></script>
    <script src="../admin_js/admin_renderer.js"></script>
</body>

</html>
