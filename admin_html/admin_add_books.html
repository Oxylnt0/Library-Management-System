<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https://esm.run https://cdn.jsdelivr.net; img-src 'self' data: https:;">

    <title>Add New Book - Puerto Palabra</title>
    <link href="../output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .book-cover-bg {
            background: linear-gradient(to right, #0f263d 0%, #183B5B 48%, #0f263d 52%, #183B5B 100%);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6);
        }
        .paper-bg {
            background-color: #fdfbf7;
            background-image: repeating-linear-gradient(#fdfbf7 0px, #fdfbf7 24px, #e6e0d4 25px);
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "@libsql/client": "https://esm.run/@libsql/client"
        }
    }
    </script>
</head>

<body class="bg-[#e6e0d4] text-slate-800 h-screen flex overflow-hidden font-sans">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../assets/background.png');"></div>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10">

        <header class="w-full bg-gradient-to-r from-[#183B5B] to-[#244D75] px-6 py-5 shadow-lg border-b border-[#D6A84A]/30 relative z-20 overflow-hidden shrink-0">
            <div class="w-full flex justify-between items-center relative z-10">
                <a href="admin_books.html" class="nav-link text-[#D6A84A] font-bold text-lg font-cinzel hover:text-white transition-colors flex items-center gap-2">
                    <span>←</span> Back
                </a>
                <div class="text-white/80 text-sm font-cinzel tracking-widest">Add New Material</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 font-sans flex items-center justify-center">
            <div class="max-w-6xl w-full mx-auto">

                <div class="book-cover-bg rounded-[18px] p-5 relative z-0">
                    <div class="flex flex-col lg:flex-row bg-[#fdfbf7] rounded-xl overflow-hidden relative z-10 min-h-[600px]">

                        <!-- Left Page (Form) -->
                        <div class="flex-1 paper-bg p-10 border-r border-[#e2e8f0]">
                            <div class="space-y-8">

                            <div>
                                <h4 class="text-xs font-bold text-[#1A202C] uppercase tracking-widest mb-4 border-b border-[#D6A84A]/20 pb-2 font-cinzel">
                                    1. Basic Information</h4>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div class="col-span-2">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Book Title
                                            *</label>
                                        <input type="text" id="inp-title"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none transition-all"
                                            placeholder="Ex: Noli Me Tangere">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Author
                                            *</label>
                                        <input type="text" id="inp-author"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none transition-all"
                                            placeholder="Ex: Jose Rizal">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">ISBN
                                            (Barcode)</label>
                                        <input type="text" id="inp-isbn"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none font-mono text-sm transition-all"
                                            placeholder="Ex: 978-...">
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h4 class="text-xs font-bold text-[#1A202C] uppercase tracking-widest mb-4 border-b border-[#D6A84A]/20 pb-2 font-cinzel">
                                    2. Publishing Details</h4>
                                <div class="grid grid-cols-2 md:grid-cols-3 gap-5">
                                    <div class="col-span-2 md:col-span-1">
                                        <label
                                            class="block text-xs font-bold text-slate-500 uppercase mb-1">Publisher</label>
                                        <input type="text" id="inp-publisher"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none transition-all"
                                            placeholder="Ex: Penguin Books">
                                    </div>
                                    <div>
                                        <label
                                            class="block text-xs font-bold text-slate-500 uppercase mb-1">Year</label>
                                        <input type="number" id="inp-year"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none transition-all"
                                            placeholder="2024">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Page
                                            Count</label>
                                        <input type="number" id="inp-pages"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none transition-all"
                                            placeholder="0">
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h4 class="text-xs font-bold text-[#1A202C] uppercase tracking-widest mb-4 border-b border-[#D6A84A]/20 pb-2 font-cinzel">
                                    3. Library Details</h4>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-5">
                                    <div class="col-span-2 md:col-span-1">
                                        <label
                                            class="block text-xs font-bold text-slate-500 uppercase mb-1">Genre</label>
                                        <select id="inp-genre"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 outline-none focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] transition-all">
                                            <option value="Fiction">Fiction</option>
                                            <option value="Non-Fiction">Non-Fiction</option>
                                            <option value="Science">Science</option>
                                            <option value="History">History</option>
                                            <option value="Technology">Technology</option>
                                            <option value="Philosophy">Philosophy</option>
                                        </select>
                                    </div>
                                    <div class="col-span-2 md:col-span-1">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Dewey
                                            Decimal</label>
                                        <input type="text" id="inp-dewey"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none transition-all"
                                            placeholder="Ex: 899.21">
                                    </div>
                                    <div>
                                        <label
                                            class="block text-xs font-bold text-slate-500 uppercase mb-1">Location</label>
                                        <input type="text" id="inp-location"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none transition-all"
                                            placeholder="Shelf A-1">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Age
                                            Limit</label>
                                        <input type="number" id="inp-age"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none transition-all"
                                            placeholder="0 = None">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Category</label>
                                        <select id="inp-category" class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 outline-none focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] transition-all">
                                            <option value="Fiction">Fiction</option>
                                            <option value="Non-Fiction">Non-Fiction</option>
                                            <option value="Reference">Reference</option>
                                            <option value="Textbook">Textbook</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Source</label>
                                        <select id="inp-source" class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 outline-none focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] transition-all">
                                            <option value="Purchased">Purchased</option>
                                            <option value="Donated">Donated</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Condition</label>
                                        <select id="inp-condition" class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 outline-none focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] transition-all">
                                            <option value="New">New</option>
                                            <option value="Good">Good</option>
                                            <option value="Damaged">Damaged</option>
                                            <option value="Outdated">Outdated</option>
                                            <option value="Obsolete">Obsolete</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h4 class="text-xs font-bold text-[#1A202C] uppercase tracking-widest mb-4 border-b border-[#D6A84A]/20 pb-2 font-cinzel">
                                    4. Inventory & Visuals</h4>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-5">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Material
                                            Type</label>
                                        <select id="inp-type"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 outline-none focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] transition-all">
                                            <option value="Book">Book</option>
                                            <option value="Periodical">Periodical</option>
                                            <option value="AV">Audio/Visual</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Total
                                            Copies</label>
                                        <input type="number" id="inp-copies" value="1" min="1"
                                            class="w-full p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none transition-all">
                                    </div>
                                    <div class="col-span-2">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Cover Image
                                            URL</label>
                                        <div class="flex gap-2">
                                            <input type="text" id="inp-image"
                                                class="flex-1 p-3 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] outline-none text-sm font-mono text-slate-600 transition-all"
                                                placeholder="Paste link here...">
                                            <button type="button" id="btn-preview"
                                                class="px-4 py-2 bg-[#183B5B] text-[#D6A84A] font-bold rounded-lg hover:bg-[#2E5F87] transition text-sm">Check</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            </div>

                        </div>
                        
                        <!-- Right Page (Preview) -->
                        <div class="w-full lg:w-[350px] shrink-0 flex flex-col items-center border-l border-[#e2e8f0] paper-bg p-10">
                            <label class="block text-xs font-bold text-[#1A202C] uppercase mb-4 tracking-widest font-cinzel">Live
                                Preview</label>

                            <div
                                class="w-48 bg-white/80 rounded-xl shadow-lg border border-[#D6A84A]/20 p-4 text-center transform transition hover:scale-105 duration-300">
                                <div
                                    class="aspect-[2/3] bg-slate-200 rounded mb-4 overflow-hidden relative flex items-center justify-center shadow-inner">
                                    <img id="img-preview" src="" class="w-full h-full object-cover hidden"
                                        alt="Preview">
                                    <span id="img-placeholder" class="text-4xl text-slate-400 opacity-50">📘</span>
                                </div>

                                <h4 id="preview-title"
                                    class="font-bold text-sm text-[#1A202C] leading-tight mb-1 line-clamp-2">Book Title
                                </h4>
                                <p id="preview-author" class="text-xs text-[#2E5F87] truncate">Author Name</p>

                                <div class="mt-3 flex flex-wrap justify-center gap-1">
                                    <span id="preview-genre"
                                        class="px-2 py-0.5 bg-slate-100 text-slate-600 text-[10px] font-bold uppercase rounded-full border border-slate-200">Fiction</span>
                                </div>
                            </div>

                            <div class="mt-8 w-full">
                                <button id="btn-save"
                                    class="w-full py-4 rounded-xl font-bold text-[#D6A84A] bg-[#183B5B] shadow-lg hover:bg-[#2E5F87] transition-all flex justify-center items-center gap-2 transform hover:scale-105">
                                    <span>
                                    </span> Save to Library
                                </button>
                                <button onclick="window.location.reload()"
                                    class="w-full mt-3 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">
                                    Reset Form
                                </button>
                            </div>
                        </div>

                    </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- This script should contain the logic for this page (previewing image, saving form, etc.) -->
    <script type="module" src="../admin_js/admin_add_books.js"></script>
</body>

</html>
