<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https://esm.run https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' http://localhost:3000;">

    <title>Add New Book - Puerto Palabra</title>
    <link href="../output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .book-cover-bg {
            background: linear-gradient(to right, #2D1B18 0%, #3E2723 48%, #2D1B18 52%, #3E2723 100%);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6);
        }
        .paper-bg {
            background-color: #fdfbf7;
            background-image: repeating-linear-gradient(#fdfbf7 0px, #fdfbf7 24px, #e6e0d4 25px);
        }
        /* Custom Scrollbar for the form */
        .form-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .form-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .form-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "@libsql/client": "https://esm.run/@libsql/client"
        }
    }
    </script>
</head>

<body class="bg-[#e6e0d4] text-slate-800 h-screen flex overflow-hidden font-sans">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../Assets/background.png');"></div>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10">

        <header class="w-full bg-gradient-to-r from-[#3E2723] to-[#5D4037] px-6 py-5 shadow-lg border-b border-[#D4AF37]/30 relative z-20 overflow-hidden shrink-0">
            <div class="w-full flex justify-between items-center relative z-10">
                <a href="admin_books.html" class="nav-link text-[#D4AF37] font-bold text-lg font-cinzel hover:text-white transition-colors flex items-center gap-2">
                    <span>←</span> Back
                </a>
                <div class="text-white/80 text-sm font-cinzel tracking-widest">Add New Material</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 font-sans flex items-center justify-center">
            <div class="max-w-6xl w-full mx-auto">

                <div class="book-cover-bg rounded-[18px] p-5 relative z-0 h-[80vh] min-h-[600px] max-h-[850px] flex flex-col">
                    <div class="flex flex-col lg:flex-row bg-[#fdfbf7] rounded-xl overflow-hidden relative z-10 flex-1 min-h-0">

                        <!-- Left Page (Form) -->
                        <div class="flex-1 paper-bg p-6 border-r border-[#e2e8f0] overflow-y-auto form-scroll">
                            <div class="space-y-3">
                            
                            <!-- Hidden Input for Donation ID -->
                            <input type="hidden" id="inp-donation-id">

                            <!-- 0. Material Type Selection (Moved to Top) -->
                            <div class="bg-[#3E2723]/5 p-2 rounded-lg border border-[#3E2723]/10 flex items-center gap-3">
                                <label class="block text-xs font-bold text-slate-500 uppercase whitespace-nowrap">I am adding a:</label>
                                <select id="inp-type" class="w-full p-2 rounded-lg bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] transition-all font-bold text-[#3E2723] text-sm">
                                    <option value="Book">Book</option>
                                    <option value="Periodical">Periodical</option>
                                </select>
                            </div>

                            <div>
                                <h4 class="text-xs font-bold text-[#1A202C] uppercase tracking-widest mb-2 border-b border-[#D4AF37]/20 pb-1 font-cinzel">
                                    1. Master Information</h4>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    <div class="col-span-2">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Material Title
                                            *</label>
                                        <input type="text" id="inp-title"
                                            class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm"
                                            placeholder="Ex: Noli Me Tangere">
                                    </div>
                                    <!-- Book Specific: Author -->
                                    <div id="field-group-author">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Author
                                            *</label>
                                        <div class="w-full p-1.5 rounded-lg bg-white/80 border border-slate-200 focus-within:ring-2 focus-within:ring-[#D4AF37]/50 focus-within:border-[#D4AF37] transition-all flex flex-wrap gap-1.5 items-center min-h-[38px]">
                                            <div id="author-chips" class="flex flex-wrap gap-1.5"></div>
                                            <input type="text" id="inp-author" class="flex-1 bg-transparent outline-none text-sm min-w-[120px] px-1 placeholder:text-slate-400" placeholder="Type name & press Enter">
                                        </div>
                                    </div>
                                    <!-- Identifier (ISBN for Books, ISSN for Periodicals) -->
                                    <div id="field-group-isbn">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">ISBN (Barcode)</label>
                                        <input type="text" id="inp-isbn" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none font-mono text-sm transition-all" placeholder="Ex: 978-...">
                                    </div>
                                    <div id="field-group-issn" class="hidden">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">ISSN</label>
                                        <input type="text" id="inp-issn" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none font-mono text-sm transition-all" placeholder="Ex: 2049-3630">
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h4 class="text-xs font-bold text-[#1A202C] uppercase tracking-widest mb-2 border-b border-[#D4AF37]/20 pb-1 font-cinzel">
                                    2. Publishing Details</h4>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    <div class="col-span-2 md:col-span-1">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Publisher</label>
                                        <input type="text" id="inp-publisher" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm" placeholder="Ex: Penguin Books">
                                    </div>
                                    <!-- Book Specific: Year -->
                                    <div id="field-group-year">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Year</label>
                                        <select id="inp-year" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm"></select>
                                    </div>
                                    <!-- Periodical Specific: Publication Date -->
                                    <div id="field-group-pub-date" class="hidden">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Pub. Date</label>
                                        <input type="date" id="inp-publication-date" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm">
                                    </div>
                                    <!-- Common: Page Count -->
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Page Count</label>
                                        <input type="number" id="inp-pages" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm" placeholder="0">
                                    </div>
                                    <!-- Book Specific: Volume -->
                                    <div id="field-group-volume">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Volume</label>
                                        <input type="text" id="inp-volume" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm" placeholder="e.g., 1 or IV">
                                    </div>
                                    <!-- Book Specific: Edition -->
                                    <div id="field-group-edition">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Edition</label>
                                        <input type="text" id="inp-edition" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm" placeholder="e.g., 2nd or Revised">
                                    </div>
                                    <!-- Periodical Specific: Volume No. -->
                                    <div id="field-group-volume-no" class="hidden">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Volume No.</label>
                                        <input type="text" id="inp-volume-no" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm" placeholder="e.g., 52">
                                    </div>
                                    <!-- Periodical Specific: Issue No. -->
                                    <div id="field-group-issue-no" class="hidden">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Issue No. *</label>
                                        <input type="text" id="inp-issue-no" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm" placeholder="e.g., 12">
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h4 class="text-xs font-bold text-[#1A202C] uppercase tracking-widest mb-2 border-b border-[#D4AF37]/20 pb-1 font-cinzel">
                                    3. Library Details</h4>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    <div class="col-span-2 md:col-span-1">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Genre</label>
                                        <select id="inp-genre"
                                            class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 outline-none focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] transition-all text-sm">
                                            <option value="" disabled selected>Select Genre</option>
                                        
                                            <optgroup label="Fiction & Literature">
                                                <option value="Action & Adventure">Action & Adventure</option>
                                                <option value="Classic Fiction">Classic Fiction</option>
                                                <option value="Fantasy">Fantasy</option>
                                                <option value="Historical Fiction">Historical Fiction</option>
                                                <option value="Horror">Horror</option>
                                                <option value="Mystery & Thriller">Mystery & Thriller</option>
                                                <option value="Romance">Romance</option>
                                                <option value="Science Fiction (Sci-Fi)">Science Fiction (Sci-Fi)</option>
                                                <option value="Poetry">Poetry</option>
                                                <option value="Drama / Plays">Drama / Plays</option>
                                                <option value="Young Adult (YA)">Young Adult (YA)</option>
                                                <option value="Children's Literature">Children's Literature</option>
                                                <option value="Graphic Novel / Comic">Graphic Novel / Comic</option>
                                            </optgroup>
                                        
                                            <optgroup label="General Non-Fiction">
                                                <option value="Biography & Autobiography">Biography & Autobiography</option>
                                                <option value="Self-Help & Motivation">Self-Help & Motivation</option>
                                                <option value="Business & Economics">Business & Economics</option>
                                                <option value="History & Geography">History & Geography</option>
                                                <option value="Philosophy & Psychology">Philosophy & Psychology</option>
                                                <option value="Religion & Theology">Religion & Theology</option>
                                                <option value="True Crime">True Crime</option>
                                                <option value="Arts & Music">Arts & Music</option>
                                                <option value="Cookery & Gastronomy">Cookery & Gastronomy</option>
                                                <option value="Travel & Tourism">Travel & Tourism</option>
                                                <option value="Sports & Recreation">Sports & Recreation</option>
                                            </optgroup>
                                        
                                            <optgroup label="Academic & Sciences">
                                                <option value="Computer Science & Technology">Computer Science & Technology</option>
                                                <option value="Medicine & Health">Medicine & Health</option>
                                                <option value="Astronomy & Space">Astronomy & Space</option>
                                                <option value="Biology & Life Sciences">Biology & Life Sciences</option>
                                                <option value="Chemistry & Physics">Chemistry & Physics</option>
                                                <option value="Environmental Science">Environmental Science</option>
                                                <option value="Mathematics">Mathematics</option>
                                                <option value="Engineering">Engineering</option>
                                                <option value="Law & Politics">Law & Politics</option>
                                                <option value="Education & Teaching">Education & Teaching</option>
                                            </optgroup>
                                        
                                            <optgroup label="Reference Materials">
                                                <option value="Dictionary">Dictionary</option>
                                                <option value="Encyclopedia">Encyclopedia</option>
                                                <option value="Atlas & Maps">Atlas & Maps</option>
                                                <option value="Almanac">Almanac</option>
                                                <option value="Thesaurus">Thesaurus</option>
                                            </optgroup>
                                        
                                            <optgroup label="Special Collections">
                                                <option value="Filipiniana">Filipiniana</option>
                                                <option value="Periodical / Journal">Periodical / Journal</option>
                                                <option value="Thesis / Dissertation">Thesis / Dissertation</option>
                                                <option value="Yearbook">Yearbook</option>
                                            </optgroup>
                                        </select>
                                    </div>
                                    <div id="field-group-dewey" class="col-span-2 md:col-span-1">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Dewey Decimal</label>
                                        <input type="text" id="inp-dewey" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm" placeholder="Ex: 899.21">
                                    </div>
                                    <!-- Common: Age Limit -->
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Age Limit</label>
                                        <input type="number" id="inp-age" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm" placeholder="0 = None">
                                    </div>
                                    <!-- Book Specific: Category -->
                                    <div id="field-group-category">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Book Category</label>
                                        <select id="inp-category" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 outline-none focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] transition-all text-sm">
                                            <option value="Fiction">Fiction</option>
                                            <option value="Non-Fiction">Non-Fiction</option>
                                            <option value="Reference">Reference</option>
                                            <option value="Textbook">Textbook</option>
                                        </select>
                                    </div>
                                    <!-- Periodical Specific: Type -->
                                    <div id="field-group-periodical-type" class="hidden">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Periodical Type</label>
                                        <select id="inp-periodical-type" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 outline-none focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] transition-all text-sm">
                                            <option value="Magazine">Magazine</option>
                                            <option value="Journal">Journal</option>
                                            <option value="Newspaper">Newspaper</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h4 class="text-xs font-bold text-[#1A202C] uppercase tracking-widest mb-2 border-b border-[#D4AF37]/20 pb-1 font-cinzel">
                                    4. Physical Inventory</h4>
                                <div class="flex justify-between items-end mb-3">
                                    <div class="w-32">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Copies to Add</label>
                                        <input type="number" id="inp-copies" value="1" min="1" max="50" class="w-full p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none transition-all text-sm text-center">
                                    </div>
                                    <button type="button" id="btn-apply-all" class="hidden text-xs font-bold bg-[#3E2723]/10 text-[#3E2723] hover:bg-[#3E2723]/20 px-3 py-2.5 rounded-lg transition-colors shadow-sm border border-[#3E2723]/20 flex items-center gap-2">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                        Duplicate 1st Copy
                                    </button>
                                </div>
                                <!-- Dynamic Table for Copies -->
                                <div id="copies-container" class="space-y-2 pr-2">
                                    <!-- Rows injected by JavaScript -->
                                </div>
                            </div>

                            <div>
                                <h4 class="text-xs font-bold text-[#1A202C] uppercase tracking-widest mt-2 mb-2 border-b border-[#D4AF37]/20 pb-1 font-cinzel">
                                    5. Visuals</h4>
                                <div class="grid grid-cols-1 gap-3">
                                    <div class="col-span-1">
                                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Cover Image
                                            URL</label>
                                        <div class="flex gap-2">
                                            <input type="text" id="inp-image"
                                                class="flex-1 p-2 rounded-lg bg-white/80 border border-slate-200 focus:ring-2 focus:ring-[#D4AF37]/50 focus:border-[#D4AF37] outline-none text-sm font-mono text-slate-600 transition-all"
                                                placeholder="Paste link here...">
                                            <button type="button" id="btn-preview" class="px-4 py-2.5 bg-[#3E2723] text-[#D4AF37] font-bold rounded-full hover:bg-[#5D4037] transition text-sm shadow-sm">
                                                Check
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            </div>

                        </div>
                        
                        <!-- Right Page (Preview) -->
                        <div class="w-full lg:w-[350px] shrink-0 flex flex-col items-center border-l border-[#e2e8f0] paper-bg p-10 overflow-y-auto form-scroll">
                            <label class="block text-xs font-bold text-[#1A202C] uppercase mb-4 tracking-widest font-cinzel">Live
                                Preview</label>

                            <div
                                class="w-48 bg-white/80 rounded-xl shadow-lg border border-[#D4AF37]/20 p-4 text-center transform transition hover:scale-105 duration-300">
                                <div
                                    class="aspect-[2/3] bg-slate-200 rounded mb-4 overflow-hidden relative flex items-center justify-center shadow-inner">
                                    <img id="img-preview" src="" class="w-full h-full object-cover hidden"
                                        alt="Preview">
                                    <span id="img-placeholder" class="text-4xl text-slate-400 opacity-50">📘</span>
                                </div>

                                <h4 id="preview-title"
                                    class="font-bold text-sm text-[#1A202C] leading-tight mb-1 line-clamp-2">Book Title
                                </h4>
                                <p id="preview-author" class="text-xs text-[#5D4037] truncate">Author Name</p>
                                <p id="preview-periodical-details" class="text-xs text-[#5D4037] truncate hidden">Vol. X, No. Y</p>

                                <div class="mt-3 flex flex-wrap justify-center gap-1">
                                    <span id="preview-genre"
                                        class="px-2 py-0.5 bg-slate-100 text-slate-600 text-[10px] font-bold uppercase rounded-full border border-slate-200">Fiction</span>
                                </div>
                            </div>

                            <div class="mt-8 w-full">
                                <button id="btn-save"
                                    class="w-full py-3 rounded-full font-bold text-[#D4AF37] bg-[#3E2723] shadow-lg hover:bg-[#5D4037] transition-all flex justify-center items-center gap-2 transform hover:scale-105">
                                    <span>
                                    </span> Save to Library
                                </button>
                                <button onclick="window.location.reload()"
                                    class="w-full mt-3 py-3 rounded-full font-bold text-slate-500 hover:bg-slate-100 transition-colors shadow-sm">
                                    Reset Form
                                </button>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
    </main>

    <!-- Custom Alert Modal -->
    <div id="custom-alert" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/50 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-[#fdfbf7] border-2 border-[#D4AF37] rounded-lg p-8 max-w-sm w-full shadow-2xl transform scale-100 transition-transform duration-300 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-16 h-16 border-t-4 border-l-4 border-[#3E2723]/20 rounded-tl-lg"></div>
            <div class="absolute bottom-0 right-0 w-16 h-16 border-b-4 border-r-4 border-[#3E2723]/20 rounded-br-lg"></div>
            
            <h3 class="text-xl font-bold text-[#3E2723] font-cinzel mb-4 text-center">Notification</h3>
            <p id="custom-alert-msg" class="text-slate-700 text-center mb-6 font-inter"></p>
            <div class="flex justify-center">
                <button id="custom-alert-btn" class="px-6 py-2 bg-[#3E2723] text-[#D4AF37] font-bold font-cinzel rounded hover:bg-[#5D4037] transition-colors">
                    Acknowledge
                </button>
            </div>
        </div>
    </div>

    <script>
        window.showCustomAlert = function(message, callback) {
            const alertBox = document.getElementById('custom-alert');
            const alertMsg = document.getElementById('custom-alert-msg');
            const alertBtn = document.getElementById('custom-alert-btn');
            
            alertMsg.textContent = message;
            alertBox.classList.remove('hidden');
            
            const newBtn = alertBtn.cloneNode(true);
            alertBtn.parentNode.replaceChild(newBtn, alertBtn);
            
            newBtn.onclick = function() {
                alertBox.classList.add('hidden');
                if (callback) callback();
            }
        };
    </script>

    <!-- This script should contain the logic for this page (previewing image, saving form, etc.) -->
    <script type="module" src="../admin_js/admin_add_books.js"></script>
</body>

</html>
