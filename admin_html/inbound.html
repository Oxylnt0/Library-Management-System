<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Inbound Donations</title>

    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../assets/background.png');"></div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-72 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">

            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                <div class="flex-1 flex flex-col overflow-hidden p-6">

                    <div class="flex justify-between items-center mb-6 shrink-0">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">Inbound Donations</h2>
                            <p class="text-sm text-slate-500">Books received from donors</p>
                        </div>

                        <div class="flex gap-3">
                            <a href="admin_donations.html"
                                class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-4 py-2 rounded-lg font-medium shadow-sm flex items-center gap-2 transition-colors">
                                <span>←</span> Back to Donations
                            </a>
                        </div>
                    </div>

                    <!-- Form Container (Replaces Table) -->
                    <div class="flex-1 overflow-y-auto">
                        <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md border border-slate-200 p-8">
                            <h3 class="text-xl font-bold text-[#183B5B] mb-6">Log Inbound Donation</h3>
                            
                            <form id="inbound-form" class="space-y-6">
                                <!-- Donor Type Toggle -->
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Donor Type</label>
                                    <div class="flex gap-4">
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="donor_type" value="registered" checked onchange="toggleDonorInput()" class="text-[#183B5B] focus:ring-[#183B5B]">
                                            <span class="text-sm text-slate-600">Registered User</span>
                                        </label>
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="donor_type" value="walkin" onchange="toggleDonorInput()" class="text-[#183B5B] focus:ring-[#183B5B]">
                                            <span class="text-sm text-slate-600">Walk-in (Guest)</span>
                                        </label>
                                    </div>
                                </div>

                                <!-- Conditional Inputs -->
                                <div id="input-user-id">
                                    <label class="block text-sm font-medium text-slate-700 mb-1">User ID / Library Card</label>
                                    <input type="number" id="inp-user-id" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B]" placeholder="Scan or enter User ID">
                                </div>

                                <div id="input-donor-name" class="hidden">
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Donor Name</label>
                                    <input type="text" id="inp-donor-name" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B]" placeholder="e.g. John Doe">
                                </div>

                                <!-- Book Details -->
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Book Title <span class="text-red-500">*</span></label>
                                    <input type="text" id="inp-book-title" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B]" placeholder="Title of the donated book">
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                                        <select id="inp-category" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B]">
                                            <option value="Fiction">Fiction</option>
                                            <option value="Non-Fiction">Non-Fiction</option>
                                            <option value="Reference">Reference</option>
                                            <option value="Textbook">Textbook</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-slate-700 mb-1">Quantity</label>
                                        <input type="number" id="inp-quantity" value="1" min="1" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B]">
                                    </div>
                                </div>

                                <div class="pt-4">
                                    <button type="submit" class="w-full bg-[#183B5B] hover:bg-[#2E5F87] text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md">
                                        Record Donation Intake
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                </main>

            </div>
        </div>
    </div>

    <script src="../admin_js/dashboard_loader.js"></script>
    <script src="../admin_js/admin_renderer.js"></script>
    <script src="../admin_js/inbound.js"></script>
</body>
</html>
