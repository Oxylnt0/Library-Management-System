<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https://esm.run https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:3000;">
    <title>Puerto Palabra - Fines Management</title>

    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../assets/background.png');"></div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-72 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">

            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                <div class="flex-1 flex flex-col overflow-hidden p-6">

                    <div class="flex flex-col gap-4 mb-6 shrink-0">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">Fines Management</h2>
                            <p class="text-sm text-slate-500">Track overdue fees and payments</p>
                        </div>

                        <div class="flex gap-3">
                            <div class="relative">
                                <input type="text" placeholder="Search user or transaction..."
                                    class="pl-10 pr-4 py-2 rounded-full border border-slate-300 focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 w-64 shadow-sm">
                                <span class="absolute left-3 top-2.5 text-slate-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </span>
                            </div>

                            <button id="btn-filter-unpaid"
                                class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-4 py-2 rounded-full font-medium shadow-sm flex items-center gap-2 transition-colors">
                                <span></span> Unpaid Only
                            </button>

                        </div>
                    </div>

                    <div
                        class="flex-1 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
                        <div class="overflow-y-auto flex-1">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 sticky top-0 z-10">
                                    <tr>
                                        <th class="p-4 w-4 border-b">
                                            <input type="checkbox" class="form-checkbox h-4 w-4 text-[#183B5B] rounded border-slate-300 focus:ring-[#183B5B]">
                                        </th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Transaction
                                            ID</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">User</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Amount</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Reason</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Due Date
                                        </th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Status</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b text-right">
                                            Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="fines-table-body" class="divide-y divide-slate-100 text-sm">
                                    <!-- Rows will be populated by admin_fines.js -->
                                </tbody>
                            </table>
                        </div>

                        <div
                            class="bg-slate-50 p-4 border-t border-slate-200 flex justify-between items-center text-xs text-slate-500 shrink-0">
                            <span>Showing 1-3 records</span>
                            <div class="flex gap-2">
                                <button class="px-3 py-1 bg-white border rounded hover:bg-slate-100">Previous</button>
                                <button class="px-3 py-1 bg-white border rounded hover:bg-slate-100">Next</button>
                            </div>
                        </div>
                    </div>
                </div>

                <aside
                    class="w-80 bg-white border-l border-slate-200 p-6 flex flex-col h-full overflow-y-auto shrink-0">
                    <h3 class="font-bold text-slate-800 mb-6">Financial Overview</h3>

                    <div class="space-y-4">
                        <div class="p-4 rounded-xl border border-red-100 shadow-sm bg-red-50">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs font-bold text-red-600 uppercase">Unpaid Fines</span>
                                <span class="text-lg"></span>
                            </div>
                            <div id="unpaid-amount" class="text-2xl font-bold text-slate-800">₱0.00</div>
                            <div id="unpaid-count" class="text-xs text-slate-500 mt-1">0 Users Outstanding</div>
                        </div>

                        <div class="p-4 rounded-xl border border-green-100 shadow-sm bg-green-50">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs font-bold text-green-700 uppercase">Collected Today</span>
                                <span class="text-lg"></span>
                            </div>
                            <div id="collected-today-amount" class="text-2xl font-bold text-slate-800">₱0.00</div>
                            <div id="collected-today-count" class="text-xs text-slate-500 mt-1">0 Transactions</div>
                        </div>
                    </div>

                    <div class="mt-8 flex-1">
                        <h4 class="font-bold text-slate-700 text-sm mb-4">Recent Payments</h4>
                        <div id="recent-payments-list" class="space-y-4">
                            <!-- Populated by JS -->
                            <div class="text-xs text-slate-400 italic">No recent payments.</div>
                        </div>
                    </div>

                    <button
                        class="w-full mt-6 bg-[#183B5B] hover:bg-[#2E5F87] text-white font-bold py-3 rounded-xl shadow-md transition-colors text-sm">
                        Generate Financial Report
                    </button>
                </aside>

                </main>

    <script>
      {
        const path = require('path');
        const { db } = require(path.join(process.cwd(), 'db_config.js'));

        let allFines = [];
        let fineSettings = [];
        let showUnpaidOnly = false;

        // Initialize
        loadFines();
        loadStats();

        // Search Listener
        const searchInput = document.querySelector('input[placeholder="Search user or transaction..."]');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                filterFines(e.target.value);
            });
        }

        // Filter Button Listener
        const filterBtn = document.getElementById('btn-filter-unpaid');
        if (filterBtn) {
            filterBtn.addEventListener('click', () => {
                toggleUnpaidFilter(filterBtn);
            });
        }

        async function loadFines() {
            const tableBody = document.getElementById('fines-table-body');
            tableBody.innerHTML = '<tr><td colspan="8" class="p-4 text-center text-slate-500">Loading fines...</td></tr>';

            try {
                const settingsRes = await db.execute("SELECT * FROM FINE_SETTINGS");
                fineSettings = settingsRes.rows;

                const result = await db.execute(`
                    SELECT 
                        f.fine_id, f.amount, f.fine_type, f.status as fine_status,
                        b.borrow_id, b.due_date, b.return_date, b.status as borrow_status,
                        u.first_name, u.last_name, u.email,
                        bk.title as book_title
                    FROM FINE f
                    JOIN BORROW_TRANSACTION b ON f.borrow_id = b.borrow_id
                    JOIN USER u ON b.user_id = u.user_id
                    LEFT JOIN BOOK bk ON b.book_id = bk.book_id
                    ORDER BY f.status DESC, b.due_date ASC
                `);

                allFines = result.rows;
                renderFines(allFines);
            } catch (error) {
                console.error('Error loading fines:', error);
                tableBody.innerHTML = '<tr><td colspan="8" class="p-4 text-center text-red-500">Failed to load data.</td></tr>';
            }
        }

        function renderFines(fines) {
            const tableBody = document.getElementById('fines-table-body');
            tableBody.innerHTML = '';

            let filtered = fines;
            
            if (showUnpaidOnly) {
                filtered = filtered.filter(f => f.fine_status === 'Unpaid');
            }

            const searchInput = document.querySelector('input[placeholder="Search user or transaction..."]');
            const term = searchInput ? searchInput.value.toLowerCase() : '';
            
            if (term) {
                filtered = filtered.filter(f => 
                    (f.first_name + ' ' + f.last_name).toLowerCase().includes(term) ||
                    f.email.toLowerCase().includes(term) ||
                    (f.book_title || '').toLowerCase().includes(term) ||
                    f.borrow_id.toString().includes(term)
                );
            }

            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="8" class="p-4 text-center text-slate-500">No records found.</td></tr>';
                return;
            }

            filtered.forEach(fine => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-50 transition-colors border-b border-slate-100';
                
                const statusColor = fine.fine_status === 'Paid' 
                    ? 'bg-green-100 text-green-700 border-green-200' 
                    : 'bg-red-100 text-red-700 border-red-200';

                const actionBtn = fine.fine_status === 'Unpaid'
                    ? `<button onclick="payFine(${fine.fine_id}, ${fine.amount})" class="text-xs font-bold text-white bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded shadow-sm transition-colors">Mark Paid</button>`
                    : `<span class="text-xs text-slate-400 font-mono">PAID</span>`;

                let reason = fine.fine_type;
                if (!reason) {
                    const match = fineSettings.find(s => s.fine_amount == fine.amount && !s.fine_type.toLowerCase().includes('overdue'));
                    reason = match ? match.fine_type : 'Overdue Fine';
                }

                const displayDate = fine.return_date || fine.due_date;

                row.innerHTML = `
                    <td class="p-4"><input type="checkbox" class="form-checkbox h-4 w-4 text-[#183B5B] rounded border-slate-300"></td>
                    <td class="p-4 font-mono text-slate-600">#${fine.borrow_id}</td>
                    <td class="p-4">
                        <div class="font-bold text-slate-700">${fine.first_name} ${fine.last_name}</div>
                        <div class="text-xs text-slate-400">${fine.email}</div>
                    </td>
                    <td class="p-4 font-bold text-slate-700">₱${fine.amount.toFixed(2)}</td>
                    <td class="p-4 text-slate-600 text-xs max-w-[200px] truncate" title="${fine.book_title || 'N/A'}">
                        <div class="font-medium text-slate-700">${reason}</div>
                        ${fine.book_title ? `<div class="text-[10px] text-slate-400">${fine.book_title}</div>` : ''}
                    </td>
                    <td class="p-4 text-slate-600">${new Date(displayDate).toLocaleDateString()}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase border ${statusColor}">
                            ${fine.fine_status}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        ${actionBtn}
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function filterFines(term) {
            renderFines(allFines);
        }

        function toggleUnpaidFilter(btn) {
            showUnpaidOnly = !showUnpaidOnly;
            const span = btn.querySelector('span');
            if (showUnpaidOnly) {
                btn.classList.add('bg-slate-100', 'border-slate-400');
                if(span) span.innerText = '✓';
            } else {
                btn.classList.remove('bg-slate-100', 'border-slate-400');
                if(span) span.innerText = '';
            }
            renderFines(allFines);
        }

        async function payFine(fineId, amount) {
            if (!confirm(`Confirm payment of ₱${amount.toFixed(2)}?`)) return;

            try {
                // 1. Get borrow_id
                const fineRes = await db.execute({
                    sql: "SELECT borrow_id FROM FINE WHERE fine_id = ?",
                    args: [fineId]
                });
                const borrowId = fineRes.rows[0]?.borrow_id;

                // 2. Update Fine
                await db.execute({
                    sql: "UPDATE FINE SET status = 'Paid' WHERE fine_id = ?",
                    args: [fineId]
                });

                // 3. Insert Payment
                if (borrowId) {
                    await db.execute({
                        sql: `INSERT INTO PAYMENT (borrow_id, fine_id, fine_amount, payment_status, payment_date, payment_method) 
                              VALUES (?, ?, ?, 'Paid', DATE('now', '+8 hours'), 'Cash')`,
                        args: [borrowId, fineId, amount]
                    });
                }

                alert('Payment recorded successfully!');
                loadFines();
                loadStats();
            } catch (error) {
                console.error('Payment error:', error);
                alert('Failed to process payment.');
            }
        }
        window.payFine = payFine;

        async function loadStats() {
            try {
                const unpaidRes = await db.execute("SELECT SUM(amount) as total FROM FINE WHERE status = 'Unpaid'");
                const usersRes = await db.execute("SELECT COUNT(DISTINCT b.user_id) as count FROM FINE f JOIN BORROW_TRANSACTION b ON f.borrow_id = b.borrow_id WHERE f.status = 'Unpaid'");
                const collectedRes = await db.execute("SELECT SUM(fine_amount) as total, COUNT(*) as count FROM PAYMENT WHERE payment_date = DATE('now', '+8 hours')");
                const recentRes = await db.execute(`
                    SELECT p.fine_amount, u.first_name, u.last_name 
                    FROM PAYMENT p 
                    JOIN BORROW_TRANSACTION b ON p.borrow_id = b.borrow_id 
                    JOIN USER u ON b.user_id = u.user_id 
                    ORDER BY p.payment_id DESC LIMIT 3
                `);

                document.getElementById('unpaid-amount').innerText = `₱${(unpaidRes.rows[0].total || 0).toFixed(2)}`;
                document.getElementById('unpaid-count').innerText = `${usersRes.rows[0].count || 0} Users Outstanding`;
                
                document.getElementById('collected-today-amount').innerText = `₱${(collectedRes.rows[0].total || 0).toFixed(2)}`;
                document.getElementById('collected-today-count').innerText = `${collectedRes.rows[0].count || 0} Transactions`;

                const recentList = document.getElementById('recent-payments-list');
                if (recentRes.rows.length > 0) {
                    recentList.innerHTML = recentRes.rows.map(p => `
                        <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-100">
                            <div>
                                <div class="font-bold text-slate-700 text-xs">${p.first_name} ${p.last_name}</div>
                                <div class="text-[10px] text-slate-400">Paid via Cash</div>
                            </div>
                            <div class="font-bold text-green-600 text-sm">+₱${p.fine_amount.toFixed(2)}</div>
                        </div>
                    `).join('');
                } else {
                    recentList.innerHTML = '<div class="text-xs text-slate-400 italic">No recent payments.</div>';
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
      }
    </script>
            </div>
        </div>
    </div>

    <script src="../admin_js/dashboard_loader.js"></script>
    <script src="../admin_js/admin_renderer.js"></script>
</body>

</html>
