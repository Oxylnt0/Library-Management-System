<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Donations</title>

    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../Assets/background.png');"></div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-72 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">

            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                <div class="flex-1 flex flex-col overflow-hidden p-6">

                    <div class="flex flex-col gap-4 mb-6 shrink-0">
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-bold text-slate-800">Donation Management</h2>
                                <p class="text-sm text-slate-500">Track and catalog donated books</p>
                            </div>

                            <div class="flex gap-3">
                                <a href="inbound.html"
                                    class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-4 py-2 rounded-full font-medium shadow-sm flex items-center gap-2 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                                    <span>Inbound</span>
                                </a>

                                <a href="outbound.html"
                                    class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-4 py-2 rounded-full font-medium shadow-sm flex items-center gap-2 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                                    <span>Outbound</span>
                                </a>
                            </div>
                        </div>

                        <div class="relative max-w-md group">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-slate-400 group-focus-within:text-[#D6A84A] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            </div>
                            <input type="text" id="donation-search-input" oninput="searchDonations(this.value)" placeholder="Search donor or book..."
                                class="w-full pl-10 pr-24 py-2.5 bg-white border border-slate-300 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] transition-all shadow-sm text-slate-800">
                            <button onclick="searchDonations(document.getElementById('donation-search-input').value)"
                                class="absolute right-1.5 top-1.5 bottom-1.5 px-4 bg-[#183B5B] text-[#D6A84A] text-xs font-bold rounded-full hover:bg-[#2E5F87] transition-colors shadow-sm">
                                Search
                            </button>
                        </div>
                    </div>

                    <div
                        class="flex-1 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
                        <div class="overflow-y-auto flex-1">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 sticky top-0 z-10">
                                    <tr>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Donor Name
                                        </th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Material Title
                                        </th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Date
                                            Received</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b text-right">
                                            Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="pending-donations-list" class="divide-y divide-slate-100 text-sm">
                                    <!-- Rows injected by JS -->
                                </tbody>
                            </table>
                        </div>

                        <div class="bg-slate-50 p-4 border-t border-slate-200 flex justify-center items-center text-xs text-slate-500 shrink-0">
                            <span id="donations-count-text">Loading donations...</span>
                        </div>
                    </div>
                </div>

                <aside
                    class="w-80 bg-white border-l border-slate-200 p-6 flex flex-col h-full overflow-y-auto shrink-0">
                    <h3 class="font-bold text-slate-800 mb-6">Donation Stats</h3>

                    <div class="space-y-4">
                        <div class="p-4 rounded-xl border border-green-100 shadow-sm bg-green-50">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs font-bold text-green-700 uppercase">Total Materials</span>
                                <span class="text-lg"></span>
                            </div>
                            <div id="stat-total-donations" class="text-2xl font-bold text-slate-800">...</div>
                            <div class="text-xs text-slate-500 mt-1">Acquired this year</div>
                        </div>

                        <div class="p-4 rounded-xl border border-amber-100 shadow-sm bg-amber-50">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs font-bold text-amber-700 uppercase">Pending Catalog</span>
                                <span class="text-lg"></span>
                            </div>
                            <div id="stat-pending-catalog" class="text-2xl font-bold text-slate-800">...</div>
                            <div class="text-xs text-slate-500 mt-1">Needs sorting</div>
                        </div>
                    </div>

                    <div class="mt-8 flex-1">
                        <h4 class="font-bold text-slate-700 text-sm mb-4">Top Donors</h4>
                        <div id="top-donors-list" class="space-y-3">
                            <!-- Injected by JS -->
                        </div>
                    </div>

                </aside>

                </main>

                <script>
                  {
                    const path = require('path');
                    const { db } = require('../db_config.js');

                    let currentSearchTerm = '';

                    window.searchDonations = function(term) {
                        currentSearchTerm = term.trim();
                        fetchPendingDonations();
                    }

                    async function fetchPendingDonations() {
                        try {
                            let sql = `
                                SELECT 
                                    d.donation_id, 
                                    COALESCE(u.first_name || ' ' || u.last_name, d.donor_name) as final_donor_name,
                                    d.book_title, 
                                    d.category, 
                                    d.quantity, 
                                    d.donation_date 
                                FROM DONATION d
                                LEFT JOIN USER u ON d.user_id = u.user_id
                                WHERE d.donation_type = 'Inbound' AND d.status = 'Pending'
                            `;
                            
                            const args = [];

                            if (currentSearchTerm) {
                                sql += " AND (COALESCE(u.first_name || ' ' || u.last_name, d.donor_name) LIKE ? OR d.book_title LIKE ?)";
                                const term = `%${currentSearchTerm}%`;
                                args.push(term, term);
                            }

                            sql += " ORDER BY donation_date DESC";

                            const result = await db.execute({ sql, args });

                            const countText = document.getElementById('donations-count-text');
                            if (countText) countText.innerText = `Showing ${result.rows.length} pending donations`;

                            const list = document.getElementById('pending-donations-list');
                            if (!list) return;

                            list.innerHTML = '';

                            if (result.rows.length > 0) {
                                result.rows.forEach(donation => {
                                    const row = document.createElement('tr');
                                    row.className = 'hover:bg-slate-50 transition-colors';
                                    
                                    // Generate initials for avatar
                                    const donorName = donation.final_donor_name || 'Anonymous';
                                    const initials = donorName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

                                    row.innerHTML = `
                                        <td class="p-4">
                                            <div class="flex items-center gap-2">
                                                <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs font-bold">${initials}</div>
                                                <div>
                                                    <div class="font-bold text-slate-800">${donorName}</div>
                                                    <div class="text-xs text-slate-500">ID: ${donation.donation_id}</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="p-4">
                                            <div class="font-medium text-slate-800">${donation.book_title}</div>
                                            <div class="text-xs text-slate-500">${donation.category}</div>
                                        </td>
                                        <td class="p-4 text-slate-600">${new Date(donation.donation_date).toLocaleDateString()}</td>
                                        <td class="p-4 text-right">
                                            <button onclick="window.location.href='admin_add_books.html?donation_id=${donation.donation_id}&title=${encodeURIComponent(donation.book_title).replace(/'/g, "%27")}&category=${encodeURIComponent(donation.category)}&quantity=${donation.quantity}'" 
                                                class="px-4 py-1.5 bg-[#183B5B] text-[#D6A84A] text-xs font-bold rounded-full hover:bg-[#2E5F87] transition shadow-sm">
                                                Catalog Item
                                            </button>
                                        </td>
                                    `;
                                    list.appendChild(row);
                                });
                            } else {
                                list.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-500">No pending donations found.</td></tr>';
                            }
                        } catch (error) {
                            console.error("Error fetching donations:", error);
                        }
                    }

                    async function fetchDonationStats() {
                        try {
                            // 1. Total Books Acquired This Year (Inbound)
                            const totalRes = await db.execute({
                                sql: "SELECT SUM(quantity) as total FROM DONATION WHERE donation_type = 'Inbound' AND strftime('%Y', donation_date) = strftime('%Y', 'now')"
                            });
                            const totalBooks = totalRes.rows[0].total || 0;

                            // 2. Pending Catalog Count
                            const pendingRes = await db.execute({
                                sql: "SELECT COUNT(*) as count FROM DONATION WHERE donation_type = 'Inbound' AND status = 'Pending'"
                            });
                            const pendingCount = pendingRes.rows[0].count || 0;

                            // 3. Top 3 Donors
                            const donorsRes = await db.execute({
                                sql: `
                                    SELECT 
                                        COALESCE(u.first_name || ' ' || u.last_name, d.donor_name) as final_donor_name, 
                                        SUM(d.quantity) as total_donated 
                                    FROM DONATION d
                                    LEFT JOIN USER u ON d.user_id = u.user_id
                                    WHERE d.donation_type = 'Inbound'
                                    GROUP BY final_donor_name
                                    HAVING final_donor_name IS NOT NULL
                                    ORDER BY total_donated DESC 
                                    LIMIT 3
                                `
                            });

                            // Update Counts
                            const totalEl = document.getElementById('stat-total-donations');
                            const pendingEl = document.getElementById('stat-pending-catalog');
                            if(totalEl) totalEl.innerText = totalBooks;
                            if(pendingEl) pendingEl.innerText = pendingCount;

                            // Update Top Donors
                            const donorsList = document.getElementById('top-donors-list');
                            if (donorsList) {
                                donorsList.innerHTML = '';
                                donorsRes.rows.forEach((donor, index) => {
                                    const row = `
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center min-w-0">
                                                <div class="w-6 h-6 bg-slate-100 rounded-full flex items-center justify-center text-[10px] mr-2 font-bold text-slate-600 shrink-0">${index + 1}</div>
                                                <span class="text-sm font-medium text-slate-700 truncate" title="${donor.final_donor_name}">
                                                    ${donor.final_donor_name}
                                                </span>
                                            </div>
                                            <span class="text-xs font-bold text-blue-600">${donor.total_donated} Books</span>
                                        </div>
                                    `;
                                    donorsList.insertAdjacentHTML('beforeend', row);
                                });
                            }
                        } catch (error) {
                            console.error("Error fetching donation stats:", error);
                        }
                    }

                    // Execute immediately
                    fetchPendingDonations();
                    fetchDonationStats();
                  }
                </script>
            </div>
        </div>
    </div>

    <script src="../admin_js/dashboard_loader.js"></script>
    <script src="../admin_js/admin_renderer.js"></script>
</body>

</html>
