<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Outbound Donations</title>

    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../assets/background.png');"></div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-72 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">

            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                <div class="flex-1 flex flex-col overflow-hidden p-6">

                    <div class="flex justify-between items-center mb-6 shrink-0">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">Outbound Donations</h2>
                            <p class="text-sm text-slate-500">Books donated by the library</p>
                        </div>

                        <div class="flex gap-3">
                            <a href="admin_donations.html"
                                class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-4 py-2 rounded-lg font-medium shadow-sm flex items-center gap-2 transition-colors">
                                <span>←</span> Back to Donations
                            </a>

                            <button
                                class="bg-[#183B5B] hover:bg-[#2E5F87] text-white px-4 py-2 rounded-lg font-medium shadow-md flex items-center gap-2 transition-colors">
                                <span>+</span> Create Outbound
                            </button>
                        </div>
                    </div>

                    <div class="flex-1 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
                        <div class="overflow-y-auto flex-1">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 sticky top-0 z-10">
                                    <tr>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Recipient</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Book Title</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Date Given</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Status</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 text-sm">
                                    <tr class="hover:bg-slate-50 transition-colors">
                                        <td class="p-4 font-bold text-slate-800">Local Public School</td>
                                        <td class="p-4">Old Textbooks (Batch 1)</td>
                                        <td class="p-4 text-slate-600">Sep 15, 2025</td>
                                        <td class="p-4"><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-full text-xs font-bold">Delivered</span></td>
                                        <td class="p-4 text-right">
                                            <button class="text-blue-600 hover:text-blue-800 font-bold text-xs">Details</button>
                                        </td>
                                    </tr>
                                    <!-- More rows can be added here -->
                                </tbody>
                            </table>
                        </div>
                        <div class="bg-slate-50 p-4 border-t border-slate-200 flex justify-between items-center text-xs text-slate-500 shrink-0">
                            <span>Showing 1 record</span>
                            <div class="flex gap-2">
                                <button class="px-3 py-1 bg-white border rounded hover:bg-slate-100">Previous</button>
                                <button class="px-3 py-1 bg-white border rounded hover:bg-slate-100">Next</button>
                            </div>
                        </div>
                    </div>
                </div>

                </main>

            </div>
        </div>
    </div>

    <script src="../admin_js/dashboard_loader.js"></script>
    <script src="../admin_js/admin_renderer.js"></script>
</body>
</html>
