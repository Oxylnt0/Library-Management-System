<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Outbound Donations</title>

    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../assets/background.png');"></div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-72 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">

            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                <div class="flex-1 flex flex-col overflow-hidden p-6">

                    <div class="flex justify-between items-center mb-6 shrink-0">
                        <div>
                            <h2 id="page-title" class="text-2xl font-bold text-slate-800">Outbound Donations</h2>
                            <p id="page-subtitle" class="text-sm text-slate-500">Identify and process books for donation (Outdated / Obsolete)</p>
                        </div>

                        <div class="flex gap-3">
                            <button id="btn-toggle-history" onclick="toggleHistoryView()" 
                                class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-4 py-2 rounded-full font-medium shadow-sm flex items-center gap-2 transition-colors">
                                View Donated Books
                            </button>
                            <a href="admin_donations.html"
                                class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-4 py-2 rounded-full font-medium shadow-sm flex items-center gap-2 transition-colors">
                                <span>←</span> Back to Donations
                            </a>
                        </div>
                    </div>

                    <!-- Eligible Books Container -->
                    <div id="eligible-books" class="flex-1 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
                        <div class="overflow-y-auto flex-1">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 sticky top-0 z-10">
                                    <tr>
                                        <th class="p-4 border-b w-10">
                                            <input type="checkbox" id="select-all" class="w-4 h-4 rounded border-slate-300 text-[#183B5B] focus:ring-[#183B5B]">
                                        </th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Material Title</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Category</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Condition</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Status</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Date Added</th>
                                    </tr>
                                </thead>
                                <tbody id="eligible-list" class="divide-y divide-slate-100 text-sm">
                                    <!-- Rows injected by JS -->
                                </tbody>
                            </table>
                            <div id="no-eligible-msg" class="hidden text-center py-12 text-slate-500">
                                No books found eligible for donation.
                            </div>
                        </div>
                        
                        <!-- Bulk Action Footer -->
                        <div class="p-4 border-t border-slate-200 bg-slate-50 flex justify-between items-center">
                            <span class="text-sm text-slate-600" id="selection-count">0 items selected</span>
                            <button id="btn-donate-selected" disabled onclick="openBulkModal()" class="bg-[#183B5B] hover:bg-[#2E5F87] disabled:opacity-50 disabled:cursor-not-allowed text-[#D6A84A] px-6 py-2 rounded-full font-bold shadow-sm transition-colors flex items-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"></path></svg>
                                Donate Selected
                            </button>
                        </div>
                    </div>
                </div>

                </main>

            </div>
        </div>
    </div>

    <!-- Outbound Donation Modal -->
    <div id="outbound-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 relative">
            <button onclick="closeOutboundModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h3 class="text-xl font-bold text-[#183B5B] mb-4">Process Outbound Donation</h3>
            
            <form id="outbound-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Selected Items</label>
                    <div id="modal-selected-count" class="text-lg font-bold text-[#183B5B]">0 Items</div>
                    <p class="text-xs text-slate-500">These items will be archived and marked as donated.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Recipient Organization <span class="text-red-500">*</span></label>
                    <input type="text" id="out-recipient" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#183B5B]" placeholder="e.g. Local Public School">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-[#183B5B] hover:bg-[#2E5F87] text-[#D6A84A] font-bold py-2 px-4 rounded-full transition-colors shadow-md">
                        Confirm Outbound Donation
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../admin_js/dashboard_loader.js"></script>
    <script src="../admin_js/admin_renderer.js"></script>
    <script>
      {
        const path = require('path');
        const { db } = require(path.join(process.cwd(), 'db_config.js'));

        let eligibleBooks = [];
        let selectedBooks = new Set();
        let isHistoryView = false;

        async function fetchEligibleBooks() {
            try {
                const response = await fetch('http://localhost:3000/api/donations/eligible');
                const result = await response.json();
                
                if (result.success) {
                    eligibleBooks = result.data;
                    renderTable();
                } else {
                    console.error(result.message);
                }
            } catch (error) {
                console.error("Error fetching eligible books:", error);
            }
        }

        async function fetchDonatedHistory() {
            try {
                const response = await fetch('http://localhost:3000/api/donations/outbound/history');
                const result = await response.json();
                if (result.success) {
                    eligibleBooks = result.data;
                    renderTable();
                }
            } catch (error) { console.error(error); }
        }

        window.toggleHistoryView = function() {
            isHistoryView = !isHistoryView;
            const btn = document.getElementById('btn-toggle-history');
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            const footer = document.querySelector('.border-t');

            if (isHistoryView) {
                btn.innerText = "View Eligible Books";
                btn.classList.add('bg-purple-50', 'text-purple-700', 'border-purple-200');
                title.innerText = "Donated Books History";
                subtitle.innerText = "Archive of books donated to other organizations";
                if(footer) footer.classList.add('hidden');
                fetchDonatedHistory();
            } else {
                btn.innerText = "View Donated Books";
                btn.classList.remove('bg-purple-50', 'text-purple-700', 'border-purple-200');
                title.innerText = "Outbound Donations";
                subtitle.innerText = "Identify and process books for donation (Outdated / Obsolete)";
                if(footer) footer.classList.remove('hidden');
                fetchEligibleBooks();
            }
        }

        async function runAutoWeeding() {
            try {
                const notification = document.createElement('div');
                notification.className = 'fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg text-xs z-50 transition-opacity duration-500';
                notification.innerText = 'Scanning catalog for outdated items...';
                document.body.appendChild(notification);

                const response = await fetch('http://localhost:3000/api/admin/weeding/process', { method: 'POST' });
                const result = await response.json();
                
                notification.innerText = result.message;
                setTimeout(() => { notification.style.opacity = '0'; setTimeout(() => notification.remove(), 500); }, 3000);
                fetchEligibleBooks(); // Refresh list to show newly tagged items
            } catch (err) {
                console.error("Error running weeding:", err);
            }
        }

        function renderTable() {
            const thead = document.querySelector('thead tr');
            const tbody = document.getElementById('eligible-list');
            const noMsg = document.getElementById('no-eligible-msg');
            tbody.innerHTML = '';

            // Update Headers
            if (isHistoryView) {
                thead.innerHTML = `
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Material Title</th>
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Category</th>
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Condition</th>
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Recipient</th>
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Date Donated</th>
                `;
            } else {
                thead.innerHTML = `
                    <th class="p-4 border-b w-10"><input type="checkbox" id="select-all" class="w-4 h-4 rounded border-slate-300 text-[#183B5B] focus:ring-[#183B5B]"></th>
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Material Title</th>
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Category</th>
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Condition</th>
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Status</th>
                    <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Date Added</th>
                `;
                bindSelectAll();
            }

            if (eligibleBooks.length === 0) {
                noMsg.innerText = isHistoryView ? "No items donated yet." : "No items found eligible for donation.";
                noMsg.classList.remove('hidden');
                return;
            }
            noMsg.classList.add('hidden');

            eligibleBooks.forEach(book => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors';
                
                // Condition Badge
                let condBadge = `<span class="px-2 py-1 rounded text-xs font-bold bg-slate-100 text-slate-600">${book.book_condition}</span>`;
                if(book.book_condition === 'Obsolete') condBadge = `<span class="px-2 py-1 rounded text-xs font-bold bg-red-100 text-red-700 border border-red-200">Obsolete</span>`;
                else if(book.book_condition === 'Outdated') condBadge = `<span class="px-2 py-1 rounded text-xs font-bold bg-amber-100 text-amber-700 border border-amber-200">Outdated</span>`;

                if (isHistoryView) {
                    const dateStr = book.donation_date ? new Date(book.donation_date).toLocaleDateString() : 'N/A';
                    const recipient = book.recipient_organization || 'Unknown';
                    tr.innerHTML = `
                        <td class="p-4 border-b font-medium text-slate-800">
                            ${book.title}
                            <div class="text-[10px] text-slate-400 font-normal uppercase mt-0.5">${book.material_type}</div>
                        </td>
                        <td class="p-4 border-b text-slate-600">${book.category}</td>
                        <td class="p-4 border-b">${condBadge}</td>
                        <td class="p-4 border-b text-slate-700">${recipient}</td>
                        <td class="p-4 border-b text-slate-500 text-xs">${dateStr}</td>
                    `;
                } else {
                    const isChecked = selectedBooks.has(`${book.item_id}-${book.material_type}`);
                    const statusBadge = `<span class="px-2 py-1 rounded text-xs font-bold ${book.status === 'Available' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">${book.status}</span>`;
                    tr.innerHTML = `
                        <td class="p-4 border-b">
                            <input type="checkbox" class="book-checkbox w-4 h-4 rounded border-slate-300 text-[#183B5B] focus:ring-[#183B5B]" 
                                value="${book.item_id}-${book.material_type}" ${isChecked ? 'checked' : ''} onchange="toggleSelection(${book.item_id}, '${book.material_type}')">
                        </td>
                        <td class="p-4 border-b font-medium text-slate-800">
                            ${book.title}
                            <div class="text-[10px] text-slate-400 font-normal uppercase mt-0.5">${book.material_type}</div>
                        </td>
                        <td class="p-4 border-b text-slate-600">${book.category}</td>
                        <td class="p-4 border-b">${condBadge}</td>
                        <td class="p-4 border-b">${statusBadge}</td>
                        <td class="p-4 border-b text-slate-500 text-xs">${new Date(book.date_added).toLocaleDateString()}</td>
                    `;
                }
                tbody.appendChild(tr);
            });
            if (!isHistoryView) updateSelectionUI();
        }

        window.toggleSelection = function(itemId, materialType) {
            const key = `${itemId}-${materialType}`;
            if (selectedBooks.has(key)) {
                selectedBooks.delete(key);
            } else {
                selectedBooks.add(key);
            }
            updateSelectionUI();
        }

        function updateSelectionUI() {
            const count = selectedBooks.size;
            document.getElementById('selection-count').innerText = `${count} items selected`;
            document.getElementById('btn-donate-selected').disabled = count === 0;
            
            // Update Select All Checkbox state
            const selectAll = document.getElementById('select-all');
            if (eligibleBooks.length > 0 && count === eligibleBooks.length) {
                selectAll.checked = true;
                selectAll.indeterminate = false;
            } else if (count > 0) {
                selectAll.checked = false;
                selectAll.indeterminate = true;
            } else {
                selectAll.checked = false;
                selectAll.indeterminate = false;
            }
        }

        // Select All Logic
        function bindSelectAll() {
            const sa = document.getElementById('select-all');
            if(sa) sa.addEventListener('change', (e) => {
                if (e.target.checked) {
                    eligibleBooks.forEach(b => selectedBooks.add(`${b.item_id}-${b.material_type}`));
                } else {
                    selectedBooks.clear();
                }
                renderTable();
            });
        }
        bindSelectAll(); // Initial bind

        // Modal Logic
        window.openBulkModal = function() {
            if (selectedBooks.size === 0) return;
            document.getElementById('modal-selected-count').innerText = `${selectedBooks.size} Items`;
            document.getElementById('out-recipient').value = '';
            document.getElementById('outbound-modal').classList.remove('hidden');
        }

        window.closeOutboundModal = function() {
            document.getElementById('outbound-modal').classList.add('hidden');
        }

        // Form Submit
        document.getElementById('outbound-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const recipient = document.getElementById('out-recipient').value;
            const btn = e.target.querySelector('button[type="submit"]');
            
            if (!recipient) return;

            // Prepare data
            const booksToDonate = eligibleBooks
                .filter(b => selectedBooks.has(`${b.item_id}-${b.material_type}`))
                .map(b => ({
                    item_id: b.item_id,
                    material_type: b.material_type,
                    book_title: b.title,
                    category: b.category
                }));

            btn.disabled = true;
            btn.innerText = "Processing...";

            const adminId = localStorage.getItem('adminId');

            try {
                const response = await fetch('http://localhost:3000/api/donations/outbound/bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        books: booksToDonate,
                        recipient_organization: recipient,
                        adminId: adminId
                    })
                });

                const result = await response.json();
                if (result.success) {
                    window.showCustomAlert(result.message, () => {
                        closeOutboundModal();
                        selectedBooks.clear();
                        fetchEligibleBooks(); // Refresh list
                    });
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                window.showCustomAlert("Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirm Outbound Donation";
            }
        });

        // Initial Load
        fetchEligibleBooks().then(() => {
            runAutoWeeding();
        });
      }
    </script>
</body>
</html>
