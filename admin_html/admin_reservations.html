<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Reservations</title>

    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../assets/background.png');"></div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-72 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">

            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                <div class="flex-1 flex flex-col overflow-hidden p-6">

                    <div class="flex flex-col gap-4 mb-6 shrink-0">
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-bold text-slate-800">Reservations Desk</h2>
                                <p class="text-sm text-slate-500">Approve or decline book requests</p>
                            </div>
                        </div>

                        <div class="flex gap-3">
                            <div class="relative max-w-md">
                                <input type="text" oninput="searchReservations(this.value)" placeholder="Search request..."
                                    class="w-full pl-10 pr-4 py-2 rounded-full border border-slate-300 focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 shadow-sm">
                                <span class="absolute left-3 top-2.5 text-slate-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </span>
                            </div>

                            <button class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-4 py-2 rounded-full font-medium shadow-sm flex items-center gap-2 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                                <span>Filter Date</span>
                            </button>
                        </div>
                    </div>

                    <div
                        class="flex-1 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
                        <div class="overflow-y-auto flex-1">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 sticky top-0 z-10">
                                    <tr>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Book Details
                                        </th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Requested By
                                        </th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Date
                                            Requested</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Pickup
                                            Deadline</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b">Status</th>
                                        <th class="p-4 text-xs font-bold text-slate-500 uppercase border-b text-right">
                                            Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="reservations-list" class="divide-y divide-slate-100 text-sm">
                                    <!-- Rows injected by JS -->
                                </tbody>
                            </table>
                        </div>

                        <div
                            class="bg-slate-50 p-4 border-t border-slate-200 flex justify-between items-center text-xs text-slate-500 shrink-0">
                            <span>Showing 1-3 pending requests</span>
                            <div class="flex gap-2">
                                <button class="px-3 py-1 bg-white border rounded hover:bg-slate-100">Previous</button>
                                <button class="px-3 py-1 bg-white border rounded hover:bg-slate-100">Next</button>
                            </div>
                        </div>
                    </div>
                </div>

                <aside
                    class="w-80 bg-white border-l border-slate-200 p-6 flex flex-col h-full overflow-y-auto shrink-0">
                    <h3 class="font-bold text-slate-800 mb-6">Reservation Stats</h3>

                    <div class="space-y-4">
                        <div class="p-4 rounded-xl border border-blue-100 shadow-sm bg-blue-50">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs font-bold text-blue-600 uppercase">Pending</span>
                                <span class="text-lg"></span>
                            </div>
                            <div id="stat-pending" class="text-2xl font-bold text-slate-800">...</div>
                            <div class="text-xs text-slate-500 mt-1">Requires action</div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 rounded-xl border border-green-100 shadow-sm bg-green-50">
                                <div class="text-xs font-bold text-green-700 mb-1">Approved</div>
                                <div id="stat-approved" class="text-xl font-bold text-slate-800">...</div>
                            </div>
                            <div class="p-4 rounded-xl border border-slate-100 shadow-sm bg-white">
                                <div class="text-xs font-bold text-slate-400 mb-1">Rejected</div>
                                <div id="stat-rejected" class="text-xl font-bold text-slate-800">...</div>
                            </div>
                        </div>
                    </div>

                </aside>

                </main>

    <script>
      {
        const path = require('path');
        const { db } = require(path.join(process.cwd(), 'db_config.js'));

        let currentSearchTerm = '';

        window.searchReservations = function(term) {
            currentSearchTerm = term.trim();
            fetchReservations();
        }

        async function fetchReservations() {
            try {
                let sql = `
                    SELECT r.reservation_id, r.reservation_date, r.status, r.user_id, r.book_id,
                           b.title, b.isbn,
                           u.first_name, u.last_name
                    FROM RESERVATION r
                    JOIN BOOK b ON r.book_id = b.book_id
                    JOIN USER u ON r.user_id = u.user_id
                `;
                
                const args = [];
                if (currentSearchTerm) {
                    sql += " WHERE (b.title LIKE ? OR u.first_name LIKE ? OR u.last_name LIKE ?)";
                    const term = `%${currentSearchTerm}%`;
                    args.push(term, term, term);
                }

                sql += " ORDER BY r.reservation_date DESC";

                const result = await db.execute({ sql, args });
                const list = document.getElementById('reservations-list');
                
                if (!list) return;
                list.innerHTML = '';

                if (result.rows.length === 0) {
                    list.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-500">No reservations found.</td></tr>';
                    return;
                }

                result.rows.forEach(res => {
                    const initials = ((res.first_name?.[0] || '') + (res.last_name?.[0] || '')).toUpperCase();
                    
                    // Calculate Pickup Deadline (Reservation Date + 3 Days)
                    const resDate = new Date(res.reservation_date);
                    const deadline = new Date(resDate);
                    deadline.setDate(deadline.getDate() + 3);

                    let statusBadge = '';
                    let actions = '';

                    if (res.status === 'Pending') {
                        statusBadge = '<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-full text-xs font-bold">Pending</span>';
                        actions = `
                            <button onclick="declineReservation(${res.reservation_id})" class="bg-red-100 hover:bg-red-200 text-red-700 p-1.5 rounded-lg transition-colors" title="Decline">Decline</button>
                        `;
                    } else if (res.status === 'Fulfilled') {
                        statusBadge = '<span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-bold">Approved</span>';
                        actions = '<span class="text-xs text-slate-400">Completed</span>';
                    } else if (res.status === 'Cancelled') {
                        statusBadge = '<span class="bg-red-100 text-red-700 px-2 py-1 rounded-full text-xs font-bold">Rejected</span>';
                        actions = '<span class="text-xs text-slate-400">Cancelled</span>';
                    }

                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="p-4">
                                <div class="font-bold text-slate-800">${res.title}</div>
                                <div class="text-xs text-slate-500">ISBN: ${res.isbn || 'N/A'}</div>
                            </td>
                            <td class="p-4">
                                <div class="flex items-center gap-2">
                                    <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold">${initials}</div>
                                    <span class="font-medium">${res.first_name} ${res.last_name}</span>
                                </div>
                            </td>
                            <td class="p-4 text-slate-600">${resDate.toLocaleDateString()}</td>
                            <td class="p-4 text-slate-600">${deadline.toLocaleDateString()}</td>
                            <td class="p-4">${statusBadge}</td>
                            <td class="p-4 text-right flex justify-end gap-2">${actions}</td>
                        </tr>
                    `;
                    list.insertAdjacentHTML('beforeend', row);
                });

            } catch (error) {
                console.error("Error fetching reservations:", error);
            }
        }

        async function fetchStats() {
            try {
                const pending = await db.execute("SELECT COUNT(*) as count FROM RESERVATION WHERE status = 'Pending'");
                const approved = await db.execute("SELECT COUNT(*) as count FROM RESERVATION WHERE status = 'Fulfilled'");
                const rejected = await db.execute("SELECT COUNT(*) as count FROM RESERVATION WHERE status = 'Cancelled'");

                document.getElementById('stat-pending').innerText = pending.rows[0].count;
                document.getElementById('stat-approved').innerText = approved.rows[0].count;
                document.getElementById('stat-rejected').innerText = rejected.rows[0].count;
            } catch (error) {
                console.error("Error fetching stats:", error);
            }
        }

        window.approveReservation = async function(reservationId, userId, bookId) {
            if(!confirm("Approve this reservation? This will mark it as borrowed.")) return;
            try {
                await db.execute({ sql: "UPDATE RESERVATION SET status = 'Fulfilled' WHERE reservation_id = ?", args: [reservationId] });
                await db.execute({ sql: "INSERT INTO BORROW_TRANSACTION (user_id, book_id, borrow_date, due_date, status, borrow_type) VALUES (?, ?, DATE('now'), DATE('now', '+7 days'), 'Borrowed', 'Outside Library')", args: [userId, bookId] });
                await db.execute({ sql: "UPDATE BOOK SET status = 'Borrowed' WHERE book_id = ?", args: [bookId] });
                fetchReservations(); fetchStats();
            } catch(e) { alert("Error: " + e.message); }
        }

        window.declineReservation = async function(reservationId) {
            if(!confirm("Decline this reservation?")) return;
            try {
                await db.execute({ sql: "UPDATE RESERVATION SET status = 'Cancelled' WHERE reservation_id = ?", args: [reservationId] });
                fetchReservations(); fetchStats();
            } catch(e) { alert("Error: " + e.message); }
        }

        fetchReservations();
        fetchStats();
      }
    </script>
            </div>
        </div>
    </div>

    <script src="../admin_js/dashboard_loader.js"></script>
    <script src="../admin_js/admin_renderer.js"></script>
</body>

</html>
