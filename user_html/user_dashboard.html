<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Student Dashboard</title>

    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' https:; connect-src 'self' http://localhost:3000; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:;">

    <link href="../output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-cinzel {
            font-family: 'Cinzel', serif;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        @keyframes rise {
            0% {
                bottom: -20px;
                transform: translateX(0);
                opacity: 0;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                bottom: 100vh;
                transform: translateX(-20px);
                opacity: 0;
            }
        }
        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(46, 95, 135, 0.6), rgba(46, 95, 135, 0.1));
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(46, 95, 135, 0.3);
            animation: rise linear infinite;
        }
        /* Wave Animation */
        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55, .5, .45, .5) infinite;
        }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 14s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 20s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 26s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 40s; }
        @keyframes move-forever {
            0% { transform: translate3d(-90px, 0, 0); }
            100% { transform: translate3d(85px, 0, 0); }
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-[#e6e0d4]">

    <!-- Background Image -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('../assets/background.png');"></div>

    <!-- Water Particles (Bubbles) -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="bubble" style="left: 5%; width: 15px; height: 15px; animation-duration: 12s; animation-delay: 0s;"></div>
        <div class="bubble" style="left: 15%; width: 25px; height: 25px; animation-duration: 15s; animation-delay: 2s;"></div>
        <div class="bubble" style="left: 25%; width: 10px; height: 10px; animation-duration: 10s; animation-delay: 4s;"></div>
        <div class="bubble" style="left: 35%; width: 20px; height: 20px; animation-duration: 18s; animation-delay: 1s;"></div>
        <div class="bubble" style="left: 45%; width: 30px; height: 30px; animation-duration: 20s; animation-delay: 3s;"></div>
        <div class="bubble" style="left: 55%; width: 12px; height: 12px; animation-duration: 14s; animation-delay: 5s;"></div>
        <div class="bubble" style="left: 65%; width: 22px; height: 22px; animation-duration: 16s; animation-delay: 2s;"></div>
        <div class="bubble" style="left: 75%; width: 18px; height: 18px; animation-duration: 13s; animation-delay: 6s;"></div>
        <div class="bubble" style="left: 85%; width: 28px; height: 28px; animation-duration: 19s; animation-delay: 0.5s;"></div>
        <div class="bubble" style="left: 95%; width: 14px; height: 14px; animation-duration: 11s; animation-delay: 3.5s;"></div>
    </div>

    <div class="flex h-screen w-screen overflow-hidden relative z-10">

        <div id="sidebar-container" class="w-64 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

                <div class="flex-1 flex flex-col overflow-y-auto p-4 no-scrollbar">

                    <div class="bg-gradient-to-r from-[#183B5B] to-[#244D75] rounded-2xl p-6 md:p-10 mb-5 shadow-xl relative overflow-hidden border border-[#D6A84A]/30 shrink-0">
                        <!-- Waves Background -->
                        <div class="absolute bottom-0 left-0 w-full h-full overflow-hidden opacity-30 pointer-events-none">
                            <svg class="absolute bottom-0 w-full h-20" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
                                <defs>
                                    <path id="gentle-wave-card" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
                                </defs>
                                <g class="parallax">
                                    <use xlink:href="#gentle-wave-card" x="48" y="0" fill="rgba(255,255,255,0.7)" />
                                    <use xlink:href="#gentle-wave-card" x="48" y="3" fill="rgba(255,255,255,0.5)" />
                                    <use xlink:href="#gentle-wave-card" x="48" y="5" fill="rgba(255,255,255,0.3)" />
                                    <use xlink:href="#gentle-wave-card" x="48" y="7" fill="rgba(255,255,255,0.1)" />
                                </g>
                            </svg>
                        </div>

                        <div class="relative z-10 w-full max-w-3xl mx-auto text-center">
                            <h2 class="text-3xl font-bold mb-2 font-cinzel text-[#D6A84A]">Welcome to Puerto Palabra</h2>
                            <p class="text-blue-100 mb-6">Your port for discovery. What will you read today, Simoun?</p>

                        </div>
                    </div>

                    <div class="mb-5">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold text-[#1A202C] text-lg font-cinzel">Recently Borrowed</h3>
                            <a href="view_all_current.html" class="text-sm bg-[#183B5B] text-[#D6A84A] px-4 py-2 rounded-full font-bold hover:bg-[#2E5F87] transition">View
                                All</a>
                        </div>

                        <div class="grid grid-cols-2 gap-4" id="recently-borrowed-container">
                            <!-- Dynamic Content -->
                        </div>
                    </div>

                    <!-- Wave Divider -->
                    <div class="w-full my-6 h-16 relative overflow-hidden">
                        <svg class="relative block w-full h-full" xmlns="http://www.w3.org/2000/svg"
                            xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 24 150 28" preserveAspectRatio="none"
                            shape-rendering="auto">
                            <defs>
                                <path id="gentle-wave"
                                    d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v60h-352z" />
                            </defs>
                            <g class="parallax">
                                <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(24, 59, 91, 0.2)" />
                                <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(214, 168, 74, 0.2)" />
                                <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(24, 59, 91, 0.4)" />
                                <use xlink:href="#gentle-wave" x="48" y="7" fill="rgba(214, 168, 74, 0.4)" />
                            </g>
                        </svg>
                    </div>

                    <div>
                        <h3 class="font-bold text-[#1A202C] text-lg mb-3 font-cinzel">New Arrivals</h3>
                        <div class="grid grid-cols-6 gap-3" id="new-arrivals-container">
                            <!-- Dynamic Content -->
                        </div>
                    </div>

                </div>

                <aside class="w-80 p-6 flex flex-col h-full overflow-y-auto shrink-0 bg-[#fbf6e9]/60 border-l border-[#D6A84A]/20 backdrop-blur-sm">

                    <div class="mb-8">
                        <h3 class="font-bold text-[#1A202C] mb-4 font-cinzel">Notifications</h3>
                        <div class="space-y-3" id="notifications-container">
                            <!-- Dynamic Content -->
                        </div>
                    </div>

                    <div class="mb-8">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold text-[#1A202C] font-cinzel">My Fines</h3>
                        </div>
                        <div
                            class="bg-gradient-to-br from-[#183B5B] to-[#0f2438] text-white rounded-xl p-5 text-center shadow-lg relative overflow-hidden border border-[#D6A84A]/30">
                            <div class="relative z-10">
                                <p class="text-xs text-blue-200 uppercase tracking-widest">Total Outstanding</p>
                                <h2 class="text-3xl font-bold mt-1 text-[#5B8C5A]" id="total-fines-amount">₱0.00</h2>
                                <p class="text-xs text-blue-200 mt-2" id="fines-status-text">Good job! No fines.</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-auto bg-[#fffaf0]/90 backdrop-blur-sm border border-[#D6A84A]/20 p-4 rounded-xl shadow-sm">
                        <h4 class="font-bold text-[#1A202C] text-sm mb-2 font-cinzel">Library Hours</h4>
                        <div class="flex justify-between text-xs text-[#2E5F87] mb-1">
                            <span>Mon - Fri</span>
                            <span>8:00 AM - 6:00 PM</span>
                        </div>
                        <div class="flex justify-between text-xs text-[#2E5F87]">
                            <span>Sat</span>
                            <span>9:00 AM - 4:00 PM</span>
                        </div>
                    </div>

                </aside>

                </main>
    <script>
      {
        const path = require('path');
        const { db } = require(path.join(process.cwd(), 'db_config.js'));

        async function loadUserDashboard() {
            const userId = localStorage.getItem('userId');
            
            // 1. Load New Arrivals (Public)
            await loadNewArrivals();

            if (!userId) {
                // Handle guest view for user-specific sections
                document.getElementById('recently-borrowed-container').innerHTML = '<p class="col-span-2 text-slate-500 text-sm">Please log in to see your reading list.</p>';
                document.getElementById('notifications-container').innerHTML = '<p class="text-slate-500 text-sm">Log in to see notifications.</p>';
                return;
            }

            // 2. Load Recently Borrowed
            await loadRecentlyBorrowed(userId);

            // 3. Load Notifications
            await loadNotifications(userId);
            
            // 4. Load Fines
            await loadFines(userId);
        }

        async function loadNewArrivals() {
            try {
                const res = await db.execute("SELECT * FROM BOOK WHERE book_condition NOT IN ('Outdated', 'Obsolete') AND status NOT IN ('Archived', 'Donated Outbound', 'Lost') ORDER BY date_added DESC LIMIT 6");
                const container = document.getElementById('new-arrivals-container');
                container.innerHTML = '';
                
                res.rows.forEach(book => {
                    const imgUrl = book.image_url || 'https://via.placeholder.com/150x220?text=No+Cover';
                    const html = `
                        <div class="group cursor-pointer" onclick="navigateTo('user_catalog.html')">
                            <div class="aspect-[2/3] bg-slate-200 rounded-xl mb-3 overflow-hidden shadow-md group-hover:shadow-xl group-hover:-translate-y-1.5 transition-all relative">
                                <img src="${imgUrl}" class="w-full h-full object-cover transition-transform group-hover:scale-105" alt="${book.title}">
                                <div class="absolute top-2 right-2 bg-[#D6A84A] text-white text-[10px] font-bold px-2 py-1 rounded">NEW</div>
                            </div>
                            <h4 class="font-bold text-sm text-[#1A202C] truncate" title="${book.title}">${book.title}</h4>
                            <p class="text-xs text-[#2E5F87] truncate">${book.author}</p>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });
            } catch (e) {
                console.error("New Arrivals Error:", e);
            }
        }

        async function loadRecentlyBorrowed(userId) {
            try {
                const query = `
                    SELECT bt.*, b.title, b.author, b.image_url 
                    FROM BORROW_TRANSACTION bt
                    JOIN BOOK b ON bt.book_id = b.book_id
                    WHERE bt.user_id = ? AND bt.status IN ('Borrowed', 'Overdue')
                    ORDER BY bt.borrow_date DESC
                `;
                const res = await db.execute({ sql: query, args: [userId] });
                const container = document.getElementById('recently-borrowed-container');
                container.innerHTML = '';

                if (res.rows.length === 0) {
                    container.innerHTML = '<div class="col-span-2 p-4 bg-white/50 rounded-xl border border-dashed border-slate-300 text-center text-slate-500 text-sm">You haven\'t borrowed any books recently.</div>';
                    return;
                }

                res.rows.forEach(loan => {
                    const dueDate = new Date(loan.due_date);
                    const today = new Date();
                    const borrowDate = new Date(loan.borrow_date);
                    
                    // Calculate progress
                    const totalDuration = dueDate - borrowDate;
                    const elapsed = today - borrowDate;
                    let percent = 0;
                    if (totalDuration > 0) {
                        percent = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
                    }
                    
                    // Days remaining
                    const diffTime = dueDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    let statusText = '';
                    let statusColor = '';
                    let barColor = '';

                    if (diffDays < 0) {
                        statusText = `Overdue by ${Math.abs(diffDays)} days`;
                        statusColor = 'text-[#C05640]';
                        barColor = 'bg-[#C05640]';
                        percent = 100;
                    } else if (diffDays === 0) {
                        statusText = 'Due today';
                        statusColor = 'text-[#C05640]';
                        barColor = 'bg-[#C05640]';
                    } else {
                        statusText = `Due in ${diffDays} days`;
                        statusColor = diffDays <= 3 ? 'text-[#C05640]' : 'text-[#5B8C5A]';
                        barColor = diffDays <= 3 ? 'bg-[#C05640]' : 'bg-[#5B8C5A]';
                    }

                    const dateStr = dueDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    const imgUrl = loan.image_url || 'https://via.placeholder.com/150x220?text=No+Cover';

                    const html = `
                        <div class="bg-[#fffaf0]/80 backdrop-blur-sm border border-[#D6A84A]/20 p-4 rounded-2xl shadow-md flex gap-4 hover:shadow-lg hover:-translate-y-1 transition-all group">
                            <div class="w-24 h-36 bg-slate-200 rounded-lg flex-shrink-0 overflow-hidden">
                                <img src="${imgUrl}" class="w-full h-full object-cover" alt="Cover">
                            </div>
                            <div class="flex flex-col justify-between flex-1">
                                <div>
                                    <h4 class="font-bold text-[#1A202C] line-clamp-2 text-sm sm:text-base">${loan.title}</h4>
                                    <p class="text-sm text-[#2E5F87]">${loan.author}</p>
                                </div>
                                <div>
                                    <div class="flex justify-between text-xs font-bold mb-1">
                                        <span class="${statusColor}">${statusText}</span>
                                        <span class="${statusColor}">${dateStr}</span>
                                    </div>
                                    <div class="w-full bg-slate-200 rounded-full h-2">
                                        <div class="${barColor} h-2 rounded-full" style="width: ${percent}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });
            } catch (e) {
                console.error("Recently Borrowed Error:", e);
            }
        }

        async function loadNotifications(userId) {
            const container = document.getElementById('notifications-container');
            container.innerHTML = '';
            let hasNotifs = false;

            try {
                // 0. Announcements (Public)
                const annQuery = `
                    SELECT title, content, date_posted, priority 
                    FROM ANNOUNCEMENT 
                    WHERE status = 'Published' 
                    AND (valid_until IS NULL OR valid_until > DATETIME('now', '+8 hours'))
                    ORDER BY 
                        CASE priority WHEN 'Urgent' THEN 1 WHEN 'High' THEN 2 ELSE 3 END, 
                        date_posted DESC
                    LIMIT 3
                `;
                const annRes = await db.execute(annQuery);
                
                annRes.rows.forEach(ann => {
                    hasNotifs = true;
                    const datePosted = new Date(ann.date_posted).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    let priorityColor = 'border-blue-200 bg-[#e3f2fd]/90';
                    let titleColor = 'text-[#2E5F87]';
                    
                    if (ann.priority === 'Urgent') {
                        priorityColor = 'border-red-200 bg-[#fee2e2]/90';
                        titleColor = 'text-[#C05640]';
                    } else if (ann.priority === 'High') {
                        priorityColor = 'border-amber-200 bg-[#fff8e1]/90';
                        titleColor = 'text-[#d97706]';
                    }

                    const html = `
                        <div class="${priorityColor} backdrop-blur-sm border p-3 rounded-lg shadow-sm">
                            <div class="flex justify-between items-start mb-1">
                                <p class="text-xs font-bold ${titleColor} uppercase">${ann.priority === 'Normal' ? 'Announcement' : ann.priority}</p>
                                <span class="text-[10px] text-slate-500">${datePosted}</span>
                            </div>
                            <h4 class="text-sm font-bold text-[#1A202C] mb-1">${ann.title}</h4>
                            <p class="text-xs text-slate-600 line-clamp-3">${ann.content}</p>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });

                // 1. Due Soon (<= 3 days)
                const dueQuery = `
                    SELECT b.title, bt.due_date 
                    FROM BORROW_TRANSACTION bt 
                    JOIN BOOK b ON bt.book_id = b.book_id 
                    WHERE bt.user_id = ? 
                    AND bt.status = 'Borrowed' 
                    AND bt.due_date <= date('now', '+3 days')
                `;
                const dueRes = await db.execute({ sql: dueQuery, args: [userId] });
                
                dueRes.rows.forEach(row => {
                    hasNotifs = true;
                    const dueDate = new Date(row.due_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    const html = `
                        <div class="bg-[#fff8e1]/90 backdrop-blur-sm border border-amber-200 p-3 rounded-lg shadow-sm">
                            <p class="text-xs font-bold text-[#C05640] uppercase mb-1">Due Soon</p>
                            <p class="text-sm text-[#1A202C]">"${row.title}" is due on <strong>${dueDate}</strong>.</p>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });

                // 2. Reservations Ready (Status = 'Approved')
                const resQuery = `
                    SELECT b.title 
                    FROM RESERVATION r 
                    JOIN BOOK b ON r.book_id = b.book_id 
                    WHERE r.user_id = ? 
                    AND r.status = 'Approved'
                `;
                const resResult = await db.execute({ sql: resQuery, args: [userId] });

                resResult.rows.forEach(row => {
                    hasNotifs = true;
                    const html = `
                        <div class="bg-[#e3f2fd]/90 backdrop-blur-sm border border-blue-200 p-3 rounded-lg shadow-sm">
                            <p class="text-xs font-bold text-[#2E5F87] uppercase mb-1">Reservation Ready</p>
                            <p class="text-sm text-[#1A202C]">"${row.title}" is ready for pickup.</p>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });

                if (!hasNotifs) {
                    container.innerHTML = '<p class="text-xs text-slate-500 italic">No new notifications.</p>';
                }

            } catch (e) {
                console.error("Notifications Error:", e);
            }
        }

        async function loadFines(userId) {
            try {
                const query = `
                    SELECT SUM(f.amount) as total 
                    FROM FINE f 
                    JOIN BORROW_TRANSACTION bt ON f.borrow_id = bt.borrow_id 
                    WHERE bt.user_id = ? AND f.status = 'Unpaid'
                `;
                const res = await db.execute({ sql: query, args: [userId] });
                const total = res.rows[0].total || 0;
                
                const amountEl = document.getElementById('total-fines-amount');
                const statusEl = document.getElementById('fines-status-text');
                
                if (amountEl) amountEl.innerText = `₱${total.toFixed(2)}`;
                
                if (statusEl) {
                    if (total > 0) {
                        statusEl.innerText = "Please settle your balance.";
                        statusEl.className = "text-xs text-red-300 mt-2";
                        amountEl.className = "text-3xl font-bold mt-1 text-red-400";
                    } else {
                        statusEl.innerText = "Good job! No fines.";
                        statusEl.className = "text-xs text-blue-200 mt-2";
                        amountEl.className = "text-3xl font-bold mt-1 text-[#5B8C5A]";
                    }
                }
            } catch (e) {
                console.error("Fines Error:", e);
            }
        }

        loadUserDashboard();
      }
    </script>
            </div>
        </div>
    </div>

    <script src="../user_js/user_loader.js"></script>
</body>

</html>
