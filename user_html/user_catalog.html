<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Browse Books</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-cinzel {
            font-family: 'Cinzel', serif;
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-gradient-to-b from-[#Fdfbf7] via-[#eef2f3] to-[#dceefb]">

    <div class="flex h-screen w-screen overflow-hidden">

        <div id="sidebar-container" class="w-80 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

        <!-- Column 2: Filters Panel -->
        <aside
            class="w-72 bg-white/60 backdrop-blur-md border-r border-white/20 flex-shrink-0 hidden md:flex flex-col h-full overflow-y-auto p-6 z-30">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-bold text-[#183B5B] text-lg font-cinzel">Advanced Filters</h2>
                <button id="clear-filters-btn" class="text-xs text-[#2E5F87] font-medium hover:underline">Reset</button>
            </div>

            <!-- Category Filter -->
            <div class="mb-8">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Category</h3>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="000"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">000 - Generalities</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="100"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">100 - Philosophy</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="200"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">200 - Religion</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="300"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">300 - Social Sciences</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="400"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">400 - Language</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="500"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">500 - Science</span>
                    </label>
                </div>
            </div>

            <!-- Availability Filter (Labeled as Author/Status per prompt structure request) -->
            <div class="mb-8">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Availability</h3>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="radio" name="status" value="All"
                            class="text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4" checked>
                        <span class="group-hover:text-slate-900 transition-colors">All Books</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="radio" name="status" value="Available"
                            class="text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">Available Now</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="radio" name="status" value="Borrowed"
                            class="text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">Borrowed</span>
                    </label>
                </div>
            </div>

            <!-- Year Range Filter -->
            <div class="mb-8">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Publication Year</h3>
                <div class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <input type="number" id="year-from" placeholder="From"
                            class="w-full pl-3 pr-2 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm">
                    </div>
                    <span class="text-slate-400 font-medium">-</span>
                    <div class="relative flex-1">
                        <input type="number" id="year-to" placeholder="To"
                            class="w-full pl-3 pr-2 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm">
                    </div>
                </div>
            </div>

            <button
                class="mt-auto w-full py-3 px-4 bg-white border border-slate-300 text-slate-700 font-semibold rounded-xl hover:bg-slate-50 hover:text-slate-900 transition-all shadow-sm active:scale-[0.98]">
                Clear Filters
            </button>
        </aside>

        <!-- Column 3: Main Catalog Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <div class="flex-1 flex flex-col h-full overflow-hidden relative">
            <!-- Header Area -->
            <div class="p-8 border-b border-white/20 bg-white/70 backdrop-blur-sm sticky top-0 z-20">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                    <div>
                        <h1 class="text-2xl font-bold text-[#183B5B] tracking-tight font-cinzel">Browse All Books</h1>
                        <p class="text-[#2E5F87] text-sm mt-1">Explore our collection of over 12,000 titles.</p>
                    </div>

                    <!-- Search Bar -->
                    <div class="relative w-full md:w-96 group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-[#2E5F87] group-focus-within:text-[#D6A84A] transition-colors"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                        <input type="text" id="search-input" placeholder="Search by title, author, or ISBN..."
                            class="w-full pl-10 pr-14 py-3 bg-white/80 border border-white/30 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] transition-all shadow-inner text-[#1A202C]">
                        <button id="search-btn"
                            class="absolute right-1.5 top-1.5 bottom-1.5 px-4 bg-[#D6A84A] text-white text-xs font-bold rounded-full hover:brightness-110 transition-colors shadow-sm">
                            Search
                        </button>
                    </div>
                </div>

                <!-- View Toggles & Sort -->
                <div class="flex items-center justify-between">
                    <p class="text-sm font-medium text-[#2E5F87]">Found <span id="result-count" class="text-[#1A202C]">0</span> results</p>

                    <div class="flex items-center gap-4">
                        <select id="sort-select"
                            class="text-sm border-none bg-transparent text-slate-600 font-medium focus:ring-0 cursor-pointer hover:text-slate-900">
                            <option>Sort by: Relevance</option>
                            <option>Newest Arrivals</option>
                            <option>Title (A-Z)</option>
                        </select>

                        <div class="h-4 w-px bg-[#2E5F87]/30"></div>

                        <div class="flex bg-white/50 p-1 rounded-lg border border-white/20">
                            <button class="p-1.5 bg-white text-[#183B5B] rounded shadow-sm transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                                    </path>
                                </svg>
                            </button>
                            <button class="p-1.5 text-[#2E5F87] hover:text-[#183B5B] transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 6h16M4 12h16M4 18h16"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Book Grid -->
            <div class="flex-1 overflow-y-auto p-8 scroll-smooth">
                <div id="book-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-8 pb-10">
                    <!-- Books will be loaded here dynamically -->
                </div>
            </div>
                </main>
                <script src="../user_js/user_catalog.js"></script>
            </div>
        </div>

    </div>

    <script src="../user_js/user_loader.js"></script>
</body>

</html>
