<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Palabra - Browse Books</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https: data:; connect-src 'self' http://localhost:3000;">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-cinzel {
            font-family: 'Cinzel', serif;
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="text-slate-800 h-screen overflow-hidden bg-gradient-to-b from-[#Fdfbf7] via-[#eef2f3] to-[#dceefb]">

    <div class="flex h-screen w-screen overflow-hidden">

        <div id="sidebar-container" class="w-80 shrink-0"></div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">

                <main class="flex-1 flex overflow-hidden">

        <!-- Column 2: Filters Panel -->
        <aside
            class="w-72 bg-white/60 backdrop-blur-md border-r border-white/20 flex-shrink-0 hidden md:flex flex-col h-full overflow-y-auto p-6 z-30">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-bold text-[#183B5B] text-lg font-cinzel">Advanced Filters</h2>
                <button id="clear-filters-btn" class="text-xs text-[#2E5F87] font-medium hover:underline">Reset</button>
            </div>

            <!-- Category Filter -->
            <div class="mb-8">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Category</h3>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="000"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">000 - Generalities</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="100"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">100 - Philosophy</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="200"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">200 - Religion</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="300"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">300 - Social Sciences</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="400"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">400 - Language</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="checkbox" value="500"
                            class="category-filter rounded text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">500 - Science</span>
                    </label>
                </div>
            </div>

            <!-- Availability Filter (Labeled as Author/Status per prompt structure request) -->
            <div class="mb-8">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Availability</h3>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="radio" name="status" value="All"
                            class="text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4" checked>
                        <span class="group-hover:text-slate-900 transition-colors">All Books</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="radio" name="status" value="Available"
                            class="text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">Available Now</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-slate-600 cursor-pointer group">
                        <input type="radio" name="status" value="Borrowed"
                            class="text-blue-600 focus:ring-blue-500 border-slate-300 w-4 h-4">
                        <span class="group-hover:text-slate-900 transition-colors">Borrowed</span>
                    </label>
                </div>
            </div>

            <!-- Year Range Filter -->
            <div class="mb-8">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Publication Year</h3>
                <div class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <input type="number" id="year-from" placeholder="From"
                            class="w-full pl-3 pr-2 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm">
                    </div>
                    <span class="text-slate-400 font-medium">-</span>
                    <div class="relative flex-1">
                        <input type="number" id="year-to" placeholder="To"
                            class="w-full pl-3 pr-2 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm">
                    </div>
                </div>
            </div>

            <button
                class="mt-auto w-full py-3 px-4 bg-white border border-slate-300 text-slate-700 font-semibold rounded-xl hover:bg-slate-50 hover:text-slate-900 transition-all shadow-sm active:scale-[0.98]">
                Clear Filters
            </button>
        </aside>

        <!-- Column 3: Main Catalog Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <div class="flex-1 flex flex-col h-full overflow-hidden relative">
            <!-- Header Area -->
            <div class="p-8 border-b border-white/20 bg-white/70 backdrop-blur-sm sticky top-0 z-20">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                    <div>
                        <h1 class="text-2xl font-bold text-[#183B5B] tracking-tight font-cinzel">Browse All Books</h1>
                        <p class="text-[#2E5F87] text-sm mt-1">Explore our collection of over 12,000 titles.</p>
                    </div>

                    <!-- Search Bar -->
                    <div class="relative w-full md:w-96 group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-[#2E5F87] group-focus-within:text-[#D6A84A] transition-colors"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                        <input type="text" id="search-input" placeholder="Search by title, author, or ISBN..."
                            class="w-full pl-10 pr-14 py-3 bg-white/80 border border-white/30 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-[#D6A84A]/50 focus:border-[#D6A84A] transition-all shadow-inner text-[#1A202C]">
                        <button id="search-btn"
                            class="absolute right-1.5 top-1.5 bottom-1.5 px-4 bg-[#D6A84A] text-white text-xs font-bold rounded-full hover:brightness-110 transition-colors shadow-sm">
                            Search
                        </button>
                    </div>
                </div>

                <!-- View Toggles & Sort -->
                <div class="flex items-center justify-between">
                    <p class="text-sm font-medium text-[#2E5F87]">Found <span id="result-count" class="text-[#1A202C]">0</span> results</p>

                    <div class="flex items-center gap-4">
                        <!-- Refresh Button -->
                        <button id="refresh-btn" class="p-2 text-[#2E5F87] hover:text-[#183B5B] transition-colors rounded-full hover:bg-slate-100" title="Refresh Database">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                        </button>

                        <select id="sort-select"
                            class="text-sm border-none bg-transparent text-slate-600 font-medium focus:ring-0 cursor-pointer hover:text-slate-900">
                            <option>Sort by: Relevance</option>
                            <option>Newest Arrivals</option>
                            <option>Title (A-Z)</option>
                        </select>

                        <div class="h-4 w-px bg-[#2E5F87]/30"></div>

                        <div class="flex bg-white/50 p-1 rounded-lg border border-white/20">
                            <button class="p-1.5 bg-white text-[#183B5B] rounded shadow-sm transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                                    </path>
                                </svg>
                            </button>
                            <button class="p-1.5 text-[#2E5F87] hover:text-[#183B5B] transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 6h16M4 12h16M4 18h16"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Book Grid -->
            <div class="flex-1 overflow-y-auto p-8 scroll-smooth">
                <div id="book-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-8 pb-10">
                    <!-- Books will be loaded here dynamically -->
                </div>
            </div>
                </main>

    <!-- Book Details Modal -->
    <div id="book-modal" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <!-- Backdrop -->
        <div class="fixed inset-0 bg-gray-900/75 transition-opacity backdrop-blur-sm" onclick="closeModal()"></div>

        <div class="fixed inset-0 z-10 overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
                <!-- Modal Panel -->
                <div class="relative transform overflow-hidden rounded-xl bg-white text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-4xl border border-white/20">
                    
                    <!-- Close Button -->
                    <div class="absolute top-4 right-4 z-10">
                        <button type="button" onclick="closeModal()" class="rounded-full bg-white/80 p-1 text-gray-400 hover:text-gray-600 hover:bg-white transition-colors">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <div class="bg-white px-4 pb-4 pt-5 sm:p-8">
                        <div class="sm:flex sm:items-start gap-8">
                            <!-- Book Cover -->
                            <div class="mx-auto flex-shrink-0 sm:mx-0 sm:w-1/3">
                                <img id="modal-image" src="" alt="Book Cover" class="w-full rounded-lg shadow-lg object-cover aspect-[2/3] ring-1 ring-gray-900/5">
                                <div class="mt-4 text-center">
                                    <span id="modal-status-badge" class="inline-flex items-center rounded-full px-3 py-1 text-sm font-medium ring-1 ring-inset">
                                        Available
                                    </span>
                                </div>
                            </div>

                            <!-- Book Details -->
                            <div class="mt-6 text-center sm:ml-4 sm:mt-0 sm:text-left flex-1">
                                <h3 class="text-3xl font-bold leading-tight text-[#183B5B] font-cinzel" id="modal-title">Book Title</h3>
                                <p class="text-xl text-[#D6A84A] font-medium mt-2" id="modal-author">Author Name</p>
                                
                                <div class="mt-8 grid grid-cols-2 gap-x-6 gap-y-4 text-sm text-slate-600">
                                    <div class="flex flex-col"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">ISBN</span><span id="modal-isbn" class="font-medium text-slate-800"></span></div>
                                    <div class="flex flex-col"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Publisher</span><span id="modal-publisher" class="font-medium text-slate-800"></span></div>
                                    <div class="flex flex-col"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Year</span><span id="modal-year" class="font-medium text-slate-800"></span></div>
                                    <div class="flex flex-col"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Genre</span><span id="modal-genre" class="font-medium text-slate-800"></span></div>
                                    <div class="flex flex-col"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Category</span><span id="modal-category" class="font-medium text-slate-800"></span></div>
                                    <div class="flex flex-col"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Location</span><span id="modal-location" class="font-medium text-slate-800"></span></div>
                                    <div class="flex flex-col"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Dewey Decimal</span><span id="modal-dewey" class="font-medium text-slate-800"></span></div>
                                    <div class="flex flex-col"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Pages</span><span id="modal-pages" class="font-medium text-slate-800"></span></div>
                                </div>

                                <div class="mt-8 pt-6 border-t border-slate-100">
                                    <h4 class="text-sm font-bold text-slate-800 mb-2">Description</h4>
                                    <p class="text-sm text-slate-600 leading-relaxed" id="modal-description">
                                        No description available for this title.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

                <script src="../user_js/user_catalog.js"></script>
            </div>
        </div>

    </div>

    <script src="../user_js/user_loader.js"></script>
</body>

</html>
