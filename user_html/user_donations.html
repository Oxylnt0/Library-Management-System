<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations - Puerto Palabra</title>
    <link href="../output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-cinzel { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="text-slate-800 h-screen overflow-hidden bg-gradient-to-b from-[#Fdfbf7] via-[#eef2f3] to-[#dceefb]">

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- Sidebar Container -->
        <div id="sidebar-container" class="w-64 shrink-0 h-full"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            
            <!-- Topbar Container -->
            <div id="topbar-container" class="shrink-0"></div>

            <div id="content-wrapper" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">
                <main class="flex-1 overflow-y-auto p-8">
                    
                    <!-- Page Header -->
                    <div class="flex items-center gap-4 mb-8 pb-4 border-b border-white/20">
                        <div class="w-10 h-10 bg-[#183B5B] rounded-lg flex items-center justify-center text-white font-bold shadow-sm shrink-0">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"></path></svg>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold text-[#183B5B] tracking-tight font-cinzel">My Donations</h1>
                            <p class="text-sm text-[#2E5F87]">Thank you for contributing to our collection.</p>
                        </div>
                    </div>

                    <!-- Table Container -->
                    <div class="bg-white/70 backdrop-blur-md rounded-2xl shadow-lg border border-white/20 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-white/50 border-b border-white/20 text-xs font-semibold text-[#2E5F87] uppercase tracking-wider">
                                        <th class="px-6 py-4 whitespace-nowrap">Material Title</th>
                                        <th class="px-6 py-4 whitespace-nowrap">Category</th>
                                        <th class="px-6 py-4 whitespace-nowrap text-center">Quantity</th>
                                        <th class="px-6 py-4 whitespace-nowrap text-center">Status</th>
                                        <th class="px-6 py-4 whitespace-nowrap text-right">Date</th>
                                    </tr>
                                </thead>
                                <tbody id="donations-list" class="divide-y divide-white/20 text-sm">
                                    <tr>
                                        <td colspan="5" class="px-6 py-4 text-center text-slate-500 italic">Loading donations...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- Footer -->
                        <div class="px-6 py-4 border-t border-white/20 flex flex-col sm:flex-row items-center justify-between gap-4 bg-white/40">
                            <span class="text-xs text-[#2E5F87] font-medium">Showing all records</span>
                        </div>
                    </div>
                </main>
                <!-- Ensure this points to user_donations.js, NOT public_loader.js -->
                <script src="../user_js/user_donations.js"></script>
            </div>
        </div>
    </div>

    <script src="../user_js/user_loader.js"></script>
</body>
</html>
